<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Space Exploration — Launcher</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #aaccff;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    .stars {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background:
        radial-gradient(1px 1px at 10% 20%, #fff 50%, transparent 100%),
        radial-gradient(1px 1px at 30% 60%, #aaccff 50%, transparent 100%),
        radial-gradient(1.5px 1.5px at 50% 10%, #fff 50%, transparent 100%),
        radial-gradient(1px 1px at 70% 80%, #ffddaa 50%, transparent 100%),
        radial-gradient(1px 1px at 90% 40%, #fff 50%, transparent 100%),
        radial-gradient(1.5px 1.5px at 20% 90%, #aaccff 50%, transparent 100%),
        radial-gradient(1px 1px at 80% 15%, #fff 50%, transparent 100%),
        radial-gradient(1px 1px at 60% 45%, #ffddaa 50%, transparent 100%),
        radial-gradient(1.5px 1.5px at 40% 70%, #fff 50%, transparent 100%),
        radial-gradient(1px 1px at 15% 55%, #aaccff 50%, transparent 100%);
      animation: twinkle 4s ease-in-out infinite alternate;
      z-index: 0;
    }
    @keyframes twinkle {
      0% { opacity: 0.5; }
      100% { opacity: 1; }
    }
    .container {
      position: relative;
      z-index: 1;
      text-align: center;
    }
    h1 {
      font-size: 48px;
      letter-spacing: 6px;
      margin-bottom: 10px;
      text-shadow: 0 0 20px rgba(100,150,255,0.8);
    }
    .subtitle {
      font-size: 14px;
      opacity: 0.6;
      margin-bottom: 40px;
      letter-spacing: 2px;
    }
    .launch-btn {
      background: transparent;
      border: 2px solid #aaccff;
      color: #aaccff;
      padding: 16px 48px;
      font-size: 20px;
      font-family: 'Courier New', monospace;
      letter-spacing: 3px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
    }
    .launch-btn:hover {
      background: #aaccff;
      color: #000;
      box-shadow: 0 0 30px rgba(100,150,255,0.5);
    }
    .controls {
      margin-top: 40px;
      font-size: 12px;
      opacity: 0.4;
      line-height: 2;
    }
    .version {
      margin-top: 60px;
      font-size: 11px;
      opacity: 0.3;
    }
  </style>
</head>
<body>
  <div class="stars"></div>
  <div class="container">
    <h1>VOID DRIFT</h1>
    <div class="subtitle">Procedural Space Exploration</div>
    <button class="launch-btn" onclick="launch()">LAUNCH</button>
    <div class="controls">
      W/A/S/D — Thrust &amp; Strafe<br>
      Mouse — Steer<br>
      Space — Fire
    </div>
    <div class="version">v1.0.0</div>
  </div>
  <script>
    function launch() {
      window.location.href = '/index.html';
    }
  </script>
</body>
</html>
