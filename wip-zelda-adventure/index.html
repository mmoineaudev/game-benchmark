<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dungeon Delver</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  canvas { display: block; margin: 0 auto; image-rendering: pixelated; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
"use strict";

/* ================================================================
 * DUNGEON DELVER - A Zelda-inspired top-down dungeon crawler
 * Zero external dependencies. All visuals via Canvas API.
 * All audio synthesized via WebAudioAPI.
 * ================================================================ */

// ================================================================
// CONFIGURATION - Centralized constants for all tunable values
// ================================================================
const CONFIG = Object.freeze({
  // Canvas & tile settings
  TILE_SIZE: 32,
  MAP_TILES_X: 64,
  MAP_TILES_Y: 64,

  // Dungeon generation
  minRooms: 6,
  maxRooms: 10,
  minRoomSize: 5,
  maxRoomSize: 12,
  doorWidth: 2,  // tiles per door opening

  // Particle system
  MAX_PARTICLES: 200,

  // Player base stats
  PLAYER_MAX_HP: 15,
  PLAYER_ATTACK: 5,
  PLAYER_DEFENSE: 2,
  PLAYER_SPEED: 3.0,

  // XP thresholds per level [level 0 = no xp required]
  XP_THRESHOLDS: [0, 30, 80, 160, 280, 450],

  // Audio volumes
  MASTER_VOLUME: 0.5,
  SFX_VOLUME: 0.7,
  MUSIC_VOLUME: 0.3,

  // Camera
  CAMERA_LERP: 0.08,

  // Game timing
  FIXED_TIMESTEP: 1 / 60,
  MAX_FRAME_SKIP: 5,

  // Combat
  ATTACK_COOLDOWN: 0.35,
  PLAYER_INVINCIBILITY_FRAMES: 0.3,
  SCREEN_SHAKE_DECAY: 0.92,
  HIT_STOP_FRAMES_NORMAL: 2,
  HIT_STOP_FRAMES_BOSS: 4,

  // Level-up growth
  LEVEL_HP_GROWTH: 0.20,
  LEVEL_ATTACK_GROWTH: 0.15,
  LEVEL_DEFENSE_GROWTH: 0.10,
  LEVEL_SPEED_GROWTH: 0.05,

  // Dungeon depth scaling
  DEPTH_HP_SCALING: 1.25,
  DEPTH_DMG_SCALING: 1.15,

  // Hazard tile cooldown
  HAZARD_COOLDOWN: 1.5,

  // Transition timing
  TRANSITION_DURATION: 0.3,

  // Minimap scale
  MINIMAP_TILE_SCALE: 2,

  // HUD panel dimensions
  HUD_PANEL_WIDTH: 220,
  HUD_PANEL_HEIGHT: 90,
  INVENTORY_SLOT_SIZE: 28,
});

// ================================================================
// SEEDED RNG - Mulberry32 pseudo-random number generator
// Reproducible dungeon generation
// ================================================================
function mulberry32(seed) {
  let s = seed | 0;
  return function() {
    s = (s + 0x6D2B79F5) | 0;
    let t = Math.imul(s ^ (s >>> 15), 1 | s);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// ================================================================
// INPUT SYSTEM - Tracks pressed/released/held key states
// Supports Arrow keys + ZQSD layouts
// ================================================================
class InputSystem {
  constructor() {
    this.keys = {};       // current frame held state
    this.pressed = {};    // just pressed this frame
    this.released = {};   // just released this frame
    this._prevPressed = {};

    window.addEventListener("keydown", (e) => {
      e.preventDefault();
      const code = e.code;
      if (!this.keys[code]) this.pressed[code] = true;
      this.keys[code] = true;
    });
    window.addEventListener("keyup", (e) => {
      e.preventDefault();
      const code = e.code;
      this.released[code] = true;
      this.keys[code] = false;
    });
  }

  isHeld(code) { return !!this.keys[code]; }
  wasPressed(code) { return !!this.pressed[code]; }
  wasReleased(code) { return !!this.released[code]; }

  /** Get movement direction vector, prefers one axis to prevent diagonal speedup */
  getMovement() {
    let dx = 0, dy = 0;
    const up = this.keys["ArrowUp"] || this.keys["KeyW"];
    const down = this.keys["ArrowDown"] || this.keys["KeyS"];
    const left = this.keys["ArrowLeft"] || this.keys["KeyA"];
    const right = this.keys["ArrowRight"] || this.keys["KeyD"];

    // ZQSD layout: Z=up, Q=left, S=down, D=right
    const zu = this.keys["KeyZ"];
    if (zu) dy -= 1;

    if (up && !zu) dy -= 1;
    if (down) dy += 1;
    if (left) dx -= 1;
    if (right) dx += 1;

    // Normalize: prefer one axis when both are pressed
    if (dx !== 0 && dy !== 0) {
      // Prefer the axis with larger absolute value, or default to Y first
      dy = Math.abs(dy) >= Math.abs(dx) ? Math.sign(dy) : 0;
      if (dy === 0) dx = Math.sign(dx);
    }

    return { dx: Math.sign(dx), dy: Math.sign(dy) };
  }

  /** Check if a specific action key was just pressed */
  isAction(actionCode) { return this.wasPressed(actionCode); }

  frameEnd() {
    // Clear frames for next input cycle
    for (const k in this.pressed) this.pressed[k] = false;
    for (const k in this.released) this.released[k] = false;
  }
}

// ================================================================
// AUDIO ENGINE - WebAudioAPI oscillators and noise generators
// Zero audio files -- all sounds synthesized live
// ================================================================
class AudioEngine {
  constructor() {
    this.ctx = null;
    this.masterGain = null;
    this.sfxGain = null;
    this.musicGain = null;
    this.noiseBuffer = null;
    this.muted = false;
    this.initialized = false;
    this._musicNodes = [];
    this._combatActive = false;
  }

  init() {
    if (this.initialized) return;
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      this.masterGain = this.ctx.createGain();
      this.masterGain.gain.value = CONFIG.MASTER_VOLUME;
      this.masterGain.connect(this.ctx.destination);

      this.sfxGain = this.ctx.createGain();
      this.sfxGain.gain.value = CONFIG.SFX_VOLUME;
      this.sfxGain.connect(this.masterGain);

      this.musicGain = this.ctx.createGain();
      this.musicGain.gain.value = CONFIG.MUSIC_VOLUME;
      this.musicGain.connect(this.masterGain);

      // Generate noise buffer for SFX (sawtooth-based white noise approximation)
      const bufferSize = this.ctx.sampleRate * 2;
      this.noiseBuffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
      const data = this.noiseBuffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() * 2 - 1) * 0.5;
      }

      this.initialized = true;
    } catch (e) {
      console.warn("Audio engine failed to initialize:", e);
    }
  }

  startMusic() {
    if (!this.initialized || this._musicNodes.length > 0) return;

    // Ambient drone: two low-frequency oscillators with gentle LFO
    const t = this.ctx.currentTime;
    const osc1 = this.ctx.createOscillator();
    osc1.type = "sine";
    osc1.frequency.value = 55; // A1
    const lfo1 = this.ctx.createOscillator();
    lfo1.type = "sine";
    lfo1.frequency.value = 0.2;
    const lfo1Gain = this.ctx.createGain();
    lfo1Gain.gain.value = 3;
    lfo1.connect(lfo1Gain);
    lfo1Gain.connect(osc1.frequency);

    const osc2 = this.ctx.createOscillator();
    osc2.type = "sine";
    osc2.frequency.value = 82.5; // E2 (a fifth above)
    const lfo2 = this.ctx.createOscillator();
    lfo2.type = "sine";
    lfo2.frequency.value = 0.15;
    const lfo2Gain = this.ctx.createGain();
    lfo2Gain.gain.value = 2;
    lfo2.connect(lfo2Gain);
    lfo2Gain.connect(osc2.frequency);

    osc1.connect(this.musicGain);
    osc2.connect(this.musicGain);
    osc1.start(t);
    osc2.start(t);
    this._musicNodes.push(osc1, osc2, lfo1, lfo2);
  }

  stopMusic() {
    for (const node of this._musicNodes) {
      try { node.stop(); } catch(e) {}
    }
    this._musicNodes = [];
  }

  setMusicIntensity(factor) {
    if (!this.initialized) return;
    // Crossfade: reduce ambient, prepare combat layer
    if (factor > 0.3 && !this._combatActive) {
      this._combatActive = true;
      const t = this.ctx.currentTime;
      const osc = this.ctx.createOscillator();
      osc.type = "sawtooth";
      osc.frequency.value = 110; // A2
      const filt = this.ctx.createBiquadFilter();
      filt.type = "lowpass";
      filt.frequency.value = 300;
      filt.Q.value = 5;
      osc.connect(filt);
      filt.connect(this.musicGain);
      const gain = this.ctx.createGain();
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(factor * 0.3, t + 1.5);
      gain.connect(this.musicGain);
      osc.start(t);
      this._musicNodes.push(osc);
    } else if (factor <= 0.3 && this._combatActive) {
      this._combatActive = false;
      // Remove the combat sawtooth node (last added)
      for (let i = this._musicNodes.length - 1; i >= 0; i--) {
        const n = this._musicNodes[i];
        if (n.type === "sawtooth") {
          try { n.stop(); } catch(e) {}
          this._musicNodes.splice(i, 1);
          break;
        }
      }
    }
  }

  /** Play a synthesized SFX by name with optional parameters */
  playSFX(name, params = {}) {
    if (!this.initialized || this.muted) return;
    const t = this.ctx.currentTime;
    try {
      switch (name) {
        case "swordWhoosh": {
          const dur = 0.15;
          const noise = this.ctx.createBufferSource();
          noise.buffer = this.noiseBuffer;
          const filt = this.ctx.createBiquadFilter();
          filt.type = "bandpass";
          filt.frequency.setValueAtTime(200, t);
          filt.frequency.exponentialRampToValueAtTime(2000, t + dur * 0.5);
          filt.frequency.exponentialRampToValueAtTime(100, t + dur);
          filt.Q.value = 3;
          const gain = this.ctx.createGain();
          gain.gain.setValueAtTime(0.4, t);
          gain.gain.linearRampToValueAtTime(0, t + dur);
          noise.connect(filt).connect(gain).connect(this.sfxGain);
          noise.start(t); noise.stop(t + dur);
          break;
        }
        case "hitImpact": {
          const freq = params.freq || 150;
          const osc = this.ctx.createOscillator();
          osc.type = "sine";
          osc.frequency.setValueAtTime(freq, t);
          osc.frequency.exponentialRampToValueAtTime(40, t + 0.1);
          const gain = this.ctx.createGain();
          gain.gain.setValueAtTime(params.vol || 0.5, t);
          gain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
          osc.connect(gain).connect(this.sfxGain);
          osc.start(t); osc.stop(t + 0.12);
          // Add a click noise
          const buf = this.ctx.createBufferSource();
          buf.buffer = this.noiseBuffer;
          const g2 = this.ctx.createGain();
          g2.gain.setValueAtTime(0.3, t);
          g2.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
          buf.connect(g2).connect(this.sfxGain);
          buf.start(t); buf.stop(t + 0.06);
          break;
        }
        case "enemyDeath": {
          for (let i = 0; i < 3; i++) {
            const osc = this.ctx.createOscillator();
            osc.type = "sine";
            osc.frequency.setValueAtTime(400 - i * 100, t + i * 0.08);
            const g = this.ctx.createGain();
            g.gain.setValueAtTime(0.3, t + i * 0.08);
            g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.08 + 0.2);
            osc.connect(g).connect(this.sfxGain);
            osc.start(t + i * 0.08); osc.stop(t + i * 0.08 + 0.25);
          }
          break;
        }
        case "playerHit": {
          const osc = this.ctx.createOscillator();
          osc.type = "square";
          osc.frequency.setValueAtTime(800, t);
          osc.frequency.exponentialRampToValueAtTime(200, t + 0.15);
          const g = this.ctx.createGain();
          g.gain.setValueAtTime(0.3, t);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
          osc.connect(g).connect(this.sfxGain);
          osc.start(t); osc.stop(t + 0.2);
          break;
        }
        case "pickupPotion": {
          // Ascending pleasant tone
          [440, 554, 659].forEach((f, i) => {
            const osc = this.ctx.createOscillator();
            osc.type = "sine";
            osc.frequency.value = f;
            const g = this.ctx.createGain();
            g.gain.setValueAtTime(0.25, t + i * 0.06);
            g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.06 + 0.3);
            osc.connect(g).connect(this.sfxGain);
            osc.start(t + i * 0.06); osc.stop(t + i * 0.06 + 0.35);
          });
          break;
        }
        case "pickupKey": {
          // Bright chime sequence
          [523, 659, 784, 1047].forEach((f, i) => {
            const osc = this.ctx.createOscillator();
            osc.type = "triangle";
            osc.frequency.value = f;
            const g = this.ctx.createGain();
            g.gain.setValueAtTime(0.2, t + i * 0.07);
            g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.07 + 0.4);
            osc.connect(g).connect(this.sfxGain);
            osc.start(t + i * 0.07); osc.stop(t + i * 0.07 + 0.45);
          });
          break;
        }
        case "levelUpFanfare": {
          // Triumphant ascending chord arpeggio
          [262, 330, 392, 523, 659, 784].forEach((f, i) => {
            const osc = this.ctx.createOscillator();
            osc.type = "triangle";
            osc.frequency.value = f;
            const g = this.ctx.createGain();
            g.gain.setValueAtTime(0.3, t + i * 0.08);
            g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.08 + 0.5);
            osc.connect(g).connect(this.sfxGain);
            osc.start(t + i * 0.08); osc.stop(t + i * 0.08 + 0.55);
          });
          break;
        }
        case "unlockDoor": {
          [300, 400, 500, 600].forEach((f, i) => {
            const osc = this.ctx.createOscillator();
            osc.type = "sine";
            osc.frequency.value = f;
            const g = this.ctx.createGain();
            g.gain.setValueAtTime(0.2, t + i * 0.1);
            g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.1 + 0.3);
            osc.connect(g).connect(this.sfxGain);
            osc.start(t + i * 0.1); osc.stop(t + i * 0.1 + 0.35);
          });
          break;
        }
        case "bossDeath": {
          for (let i = 0; i < 6; i++) {
            const osc = this.ctx.createOscillator();
            osc.type = "sawtooth";
            osc.frequency.setValueAtTime(500 - i * 70, t + i * 0.1);
            osc.frequency.exponentialRampToValueAtTime(30, t + i * 0.1 + 0.4);
            const g = this.ctx.createGain();
            g.gain.setValueAtTime(0.4, t + i * 0.1);
            g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.1 + 0.5);
            osc.connect(g).connect(this.sfxGain);
            osc.start(t + i * 0.1); osc.stop(t + i * 0.1 + 0.6);
          }
          break;
        }
      }
    } catch (e) { /* Audio error, silently ignore */ }
  }
}

// ================================================================
// PARTICLE SYSTEM - Pool-based particles for visual effects
// ================================================================
class ParticleSystem {
  constructor(max = CONFIG.MAX_PARTICLES) {
    this.max = max;
    this.pool = [];
    this.active = [];
    for (let i = 0; i < max; i++) {
      this.pool.push({ x: 0, y: 0, vx: 0, vy: 0, life: 0, maxLife: 1, r: 255, g: 255, b: 255, alpha: 1, size: 3, type: "spark" });
    }
  }

  /** Spawn a combat spark particle */
  spawnSpark(x, y, vx, vy, r, g, b, size = 3, life = 0.4) {
    if (this.pool.length === 0) return;
    const p = this.pool.pop();
    p.x = x; p.y = y; p.vx = vx; p.vy = vy;
    p.r = r; p.g = g; p.b = b; p.alpha = 1;
    p.size = size; p.life = life; p.maxLife = life; p.type = "spark";
    this.active.push(p);
  }

  /** Spawn an explosion of particles */
  spawnExplosion(x, y, count, r, g, b, speed = 100, life = 0.6) {
    for (let i = 0; i < count; i++) {
      const angle = (Math.PI * 2 / count) * i + Math.random() * 0.3;
      const spd = speed * (0.5 + Math.random() * 0.5);
      this.spawnSpark(x, y, Math.cos(angle) * spd, Math.sin(angle) * spd, r, g, b, 2 + Math.random() * 4, life * (0.7 + Math.random() * 0.3));
    }
  }

  /** Spawn a trail particle */
  spawnTrail(x, y, r, g, b, size = 2) {
    this.spawnSpark(x, y, (Math.random() - 0.5) * 10, (Math.random() - 0.5) * 10, r, g, b, size, 0.3);
  }

  /** Spawn floating text marker */
  spawnFloatingText(text, x, y, r, g, b, fontSize = 14) {
    if (!this._floatingTexts) this._floatingTexts = [];
    this._floatingTexts.push({ text, x, y, vx: (Math.random() - 0.5) * 20, life: 1.0, r, g, b, fontSize });
  }

  /** Spawn a golden level-up burst */
  spawnLevelUpBurst(x, y) {
    for (let i = 0; i < 30; i++) {
      const angle = (Math.PI * 2 / 30) * i;
      const spd = 80 + Math.random() * 60;
      this.spawnSpark(x, y, Math.cos(angle) * spd, Math.sin(angle) * spd, 255, 216, 53, 3 + Math.random() * 4, 0.8);
    }
  }

  update(dt) {
    // Update particles
    for (let i = this.active.length - 1; i >= 0; i--) {
      const p = this.active[i];
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life -= dt;
      p.alpha = Math.max(0, p.life / p.maxLife);
      if (p.life <= 0) {
        this.pool.push(this.active.splice(i, 1)[0]);
      }
    }
    // Update floating texts
    for (let i = this._floatingTexts.length - 1; i >= 0; i--) {
      const ft = this._floatingTexts[i];
      ft.y -= 40 * dt;
      ft.x += ft.vx * dt;
      ft.life -= dt;
      if (ft.life <= 0) this._floatingTexts.splice(i, 1);
    }
  }

  render(renderer) {
    for (const p of this.active) {
      const a = p.alpha * 0.8;
      renderer.ctx.fillStyle = `rgba(${p.r},${p.g},${p.b},${a})`;
      renderer.ctx.beginPath();
      renderer.ctx.arc(p.x, p.y, p.size * p.alpha, 0, Math.PI * 2);
      renderer.ctx.fill();
    }
    // Floating texts
    if (!this._floatingTexts) return;
    for (const ft of this._floatingTexts) {
      const a = Math.min(1, ft.life * 2);
      renderer.drawText(ft.text, ft.x, ft.y, `rgba(${ft.r},${ft.g},${ft.b},${a})`, ft.fontSize, true, 2);
    }
  }

  clear() {
    while (this.active.length > 0) this.pool.push(this.active.pop());
    if (this._floatingTexts) this._floatingTexts = [];
  }
}

// ================================================================
// RENDERER - Canvas rendering helper with camera transform
// ================================================================
class Renderer {
  constructor(canvas) {
    this.canvas = canvas;
    this.ctx = canvas.getContext("2d");
    this.cameraX = 0;
    this.cameraY = 0;
    this.shakeX = 0;
    this.shakeY = 0;
    this.shakeIntensity = 0;
  }

  resize(w, h) {
    // Fit to screen with aspect ratio for tile grid
    const cols = CONFIG.MAP_TILES_X + 4;
    const rows = CONFIG.MAP_TILES_Y + 2;
    const tw = w / cols;
    const th = h / rows;
    const scale = Math.min(tw, th);
    this.tileSize = scale;
    this.drawWidth = cols * scale;
    this.drawHeight = rows * scale;
    // Center canvas content
    this.offsetX = (w - this.drawWidth) / 2;
    this.offsetY = (h - this.drawHeight) / 2;
  }

  begin() {
    const ctx = this.ctx;
    const w = this.canvas.width;
    const h = this.canvas.height;
    // Fill background black outside the tile grid area
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, w, h);

    // Apply camera + shake transform for drawing area
    ctx.save();
    const sx = this.shakeIntensity * (Math.random() * 2 - 1);
    const sy = this.shakeIntensity * (Math.random() * 2 - 1);
    ctx.translate(this.offsetX + this.cameraX - w / 2 + this.drawWidth / 2 + sx,
                  this.offsetY + this.cameraY - h / 2 + this.drawHeight / 2 + sy);
    ctx.scale(this.tileSize / CONFIG.TILE_SIZE, this.tileSize / CONFIG.TILE_SIZE);
  }

  end() {
    this.ctx.restore();
  }

  /** Draw a filled rectangle in tile coordinates */
  drawRect(x, y, w, h, color) {
    this.ctx.fillStyle = color;
    this.ctx.fillRect(x, y, w, h);
  }

  /** Draw a rectangle with border */
  drawRectBorder(x, y, w, h, fillColor, borderColor, borderWidth = 1) {
    this.drawRect(x, y, w, h, fillColor);
    if (borderWidth > 0 && borderColor) {
      this.ctx.strokeStyle = borderColor;
      this.ctx.lineWidth = borderWidth;
      this.ctx.strokeRect(x, y, w, h);
    }
  }

  /** Draw a circle */
  drawCircle(cx, cy, radius, color) {
    this.ctx.fillStyle = color;
    this.ctx.beginPath();
    this.ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    this.ctx.fill();
  }

  /** Draw text with optional outline */
  drawText(text, x, y, color, fontSize = 12, bold = false, outlineWidth = 1) {
    const ctx = this.ctx;
    ctx.font = `${bold ? "bold " : ""}${fontSize}px monospace`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    if (outlineWidth > 0 && color.length < 8) {
      // Simple outline
      ctx.strokeStyle = "#000";
      ctx.lineWidth = outlineWidth + 2;
      ctx.strokeText(text, x, y);
    }
    ctx.fillStyle = color;
    ctx.fillText(text, x, y);
  }

  /** Draw a line */
  drawLine(x1, y1, x2, y2, color, width = 1) {
    this.ctx.strokeStyle = color;
    this.ctx.lineWidth = width;
    this.ctx.beginPath();
    this.ctx.moveTo(x1, y1);
    this.ctx.lineTo(x2, y2);
    this.ctx.stroke();
  }

  /** Clear the canvas fully (for overlay screens) */
  clearFull(color = "#000") {
    this.ctx.fillStyle = color;
    this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
  }

  /** Draw a glowing circle effect */
  drawGlow(cx, cy, radius, color) {
    const gradient = this.ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
    gradient.addColorStop(0, color);
    gradient.addColorStop(1, "transparent");
    this.ctx.fillStyle = gradient;
    this.ctx.beginPath();
    this.ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    this.ctx.fill();
  }

  /** Draw a rectangle with glow border */
  drawGlowRect(x, y, w, h, fillColor, glowColor, glowSize = 4) {
    this.drawRect(x, y, w, h, fillColor);
    this.drawGlow(x + w / 2, y + h / 2, Math.max(w, h) / 2 + glowSize, glowColor);
  }

  /** Draw a semi-transparent overlay */
  drawOverlay(alpha) {
    const ctx = this.ctx;
    const w = this.canvas.width;
    const h = this.canvas.height;
    ctx.fillStyle = `rgba(0,0,0,${alpha})`;
    // Apply same camera transform as begin() but render full-screen
  }
}

// ================================================================
// ENTITY BASE CLASS - All game objects extend from Entity
// ================================================================
class Entity {
  constructor(x, y, width, height) {
    this.x = x;        // pixel position (tile * TILE_SIZE + offset)
    this.y = y;
    this.vx = 0;       // velocity in pixels/second
    this.vy = 0;
    this.width = width || CONFIG.TILE_SIZE;
    this.height = height || CONFIG.TILE_SIZE;
    this.active = true;
    this.dead = false;
  }

  getLeft() { return this.x; }
  getRight() { return this.x + this.width; }
  getTop() { return this.y; }
  getBottom() { return this.y + this.height; }
  getCenterX() { return this.x + this.width / 2; }
  getCenterY() { return this.y + this.height / 2; }

  /** Check AABB overlap with another entity */
  isColliding(other) {
    return this.getLeft() < other.getRight() &&
           this.getRight() > other.getLeft() &&
           this.getTop() < other.getBottom() &&
           this.getBottom() > other.getTop();
  }

  /** Check AABB overlap with a rectangular region */
  rectOverlaps(x, y, w, h) {
    return this.x < x + w && this.x + this.width > x &&
           this.y < y + h && this.y + this.height > y;
  }

  markDead() { this.dead = true; this.active = false; }

  update(dt) { /* override */ }
  render(renderer) { /* override */ }
}

// ================================================================
// TILE DEFINITIONS (constants used throughout the game)
// ================================================================
const TILES = Object.freeze({ FLOOR: 0, WALL: 1, DOOR_LOCKED: 2, DOOR_UNLOCKED: 3, HAZARD: 4, EXIT: 5, CORRIDOR_FLOOR: 6 });

// ================================================================
// WEAPON DEFINITIONS
// ================================================================
const WEAPONS = {
  shortsword: { name: "Shortsword", attackBonus: 0, speedMultiplier: 1.0, hitboxSizeMultiplier: 1.0, color: "#b0bec5" },
  longswords: { name: "Longsword", attackBonus: 3, speedMultiplier: 0.9, hitboxSizeMultiplier: 1.3, color: "#78909c" },
  greatsword: { name: "Greatsword", attackBonus: 6, speedMultiplier: 0.8, hitboxSizeMultiplier: 1.6, color: "#546e7a" },
  dagger:     { name: "Dagger", attackBonus: -1, speedMultiplier: 1.3, hitboxSizeMultiplier: 0.7, color: "#cfd8dc" },
};

// ================================================================
// PLAYER CLASS (extends Entity)
// Controls the knight character with combat, inventory, and stats
// ================================================================
class Player extends Entity {
  constructor(x, y) {
    super(x, y, CONFIG.TILE_SIZE * 0.8, CONFIG.TILE_SIZE * 0.8); // slightly smaller hitbox than a tile
    this.maxHP = CONFIG.PLAYER_MAX_HP;
    this.curHP = this.maxHP;
    this.attack = CONFIG.PLAYER_ATTACK;
    this.defense = CONFIG.PLAYER_DEFENSE;
    this.xp = 0;
    this.level = 1;
    this.speed = CONFIG.PLAYER_SPEED * CONFIG.TILE_SIZE; // px/s
    this.facing = 2; // 0=up, 1=right, 2=down, 3=left

    // Animation state
    this.walkCycleFrame = 0;
    this.idleBobPhase = 0;
    this.isAttacking = false;
    this.attackAnimProgress = 0;
    this.attackAngle = 0;

    // Timers
    this.hitFlashTimer = 0;
    this.invincibleFrames = 0;
    this.attackCooldown = 0;
    this.hazardCooldown = 0;
    this.levelUpAnimTimer = 0;

    // Inventory: 8 slots
    this.inventory = []; // Array of item objects or null
    for (let i = 0; i < 8; i++) this.inventory.push(null);

    // Current equipped weapon
    this.equipWeapon(WEAPONS.shortsword);

    // Stats tracking
    this.enemiesDefeated = 0;
    this.itemsCollected = 0;
  }

  equipWeapon(weapon) {
    this.currentWeapon = { ...weapon };
  }

  /** Take damage from a source, with invincibility frames */
  takeDamage(amount, sourceDir) {
    if (this.invincibleFrames > 0 || this.dead) return 0;
    const reduced = Math.max(1, amount - this.defense);
    this.curHP = Math.max(0, this.curHP - reduced);
    this.hitFlashTimer = 0.2;
    if (this.curHP <= 0) {
      this.markDead();
    }
    return reduced;
  }

  /** Heal the player */
  heal(amount) {
    const actual = Math.min(amount, this.maxHP - this.curHP);
    this.curHP = Math.min(this.maxHP, this.curHP + amount);
    return actual;
  }

  /** Gain XP and potentially level up */
  gainXP(amount) {
    this.xp += amount;
    while (this.level < CONFIG.XP_THRESHOLDS.length && this.xp >= CONFIG.XP_THRESHOLDS[this.level]) {
      this.xp -= CONFIG.XP_THRESHOLDS[this.level];
      this.levelUp();
    }
  }

  /** Level up: increase stats */
  levelUp() {
    this.level++;
    const growthHP = CONFIG.LEVEL_HP_GROWTH;
    const growthAtk = CONFIG.LEVEL_ATTACK_GROWTH;
    const growthDef = CONFIG.LEVEL_DEFENSE_GROWTH;
    const growthSpd = CONFIG.LEVEL_SPEED_GROWTH;

    this.maxHP = Math.round(this.maxHP * (1 + growthHP));
    this.curHP = Math.min(this.curHP + Math.round(this.maxHP * 0.3), this.maxHP); // heal on level up
    this.attack = Math.round(this.attack * (1 + growthAtk));
    this.defense = Math.round(this.defense * (1 + growthDef));
    this.speed *= (1 + growthSpd);
    this.levelUpAnimTimer = 1.5;

    return { level: this.level };
  }

  /** Get the melee hitbox based on facing direction and equipped weapon */
  getAttackHitbox() {
    const hs = this.currentWeapon.hitboxSizeMultiplier;
    const dist = CONFIG.TILE_SIZE * 0.9 * hs;
    const cx = this.getCenterX();
    const cy = this.getCenterY();
    switch (this.facing) {
      case 0: return { x: cx - 12, y: this.y - dist * 1.5, w: 24, h: dist };   // up
      case 1: return { x: this.x + this.width, y: cy - 12, w: dist, h: 24 };    // right
      case 2: return { x: cx - 12, y: this.y + this.height, w: 24, h: dist };   // down
      case 3: return { x: this.x - dist, y: cy - 12, w: dist, h: 24 };           // left
    }
  }

  update(dt, dungeon) {
    if (this.dead) return;

    const input = dungeon.input;
    const movement = input.getMovement();

    // Attack animation
    if (this.isAttacking) {
      this.attackAnimProgress += dt / 0.2; // attack animation lasts ~0.2s
      this.attackAngle -= Math.PI * 1.5 * (dt / 0.2);
      if (this.attackAnimProgress >= 1) {
        this.isAttacking = false;
        this.attackAnimProgress = 0;
        this.attackAngle = 0;
      }
    } else {
      // Update facing direction based on movement
      if (movement.dx !== 0 || movement.dy !== 0) {
        if (Math.abs(movement.dx) >= Math.abs(movement.dy)) {
          this.facing = movement.dx > 0 ? 1 : 3;
        } else {
          this.facing = movement.dy > 0 ? 2 : 0;
        }
      }

      // Movement
      let nx = this.x + movement.dx * this.speed * dt;
      let ny = this.y + movement.dy * this.speed * dt;

      // Clamp position to map bounds
      nx = Math.max(0, Math.min((CONFIG.MAP_TILES_X - 1) * CONFIG.TILE_SIZE, nx));
      ny = Math.max(0, Math.min((CONFIG.MAP_TILES_Y - 1) * CONFIG.TILE_SIZE, ny));

      // Check tile collisions - slide along walls
      const leftTile = Math.floor(nx / CONFIG.TILE_SIZE);
      const rightTile = Math.floor((nx + this.width - 1) / CONFIG.TILE_SIZE);
      const topTile = Math.floor(ny / CONFIG.TILE_SIZE);
      const bottomTile = Math.floor((ny + this.height - 1) / CONFIG.TILE_SIZE);

      let blockedX = false;
      let blockedY = false;

      // Check X collision
      for (let ty = topTile; ty <= bottomTile; ty++) {
        if (ty >= 0 && ty < CONFIG.MAP_TILES_Y) {
          for (let tx = leftTile; tx <= rightTile; tx++) {
            if (tx >= 0 && tx < CONFIG.MAP_TILES_X) {
              const tile = dungeon.getTile(tx, ty);
              if (tile === TILES.WALL || tile === TILES.DOOR_LOCKED) { blockedX = true; break; }
            }
          }
        }
      }

      // Check Y collision
      for (let tx = leftTile; tx <= rightTile; tx++) {
        if (tx >= 0 && tx < CONFIG.MAP_TILES_X) {
          for (let ty = topTile; ty <= bottomTile; ty++) {
            if (ty >= 0 && ty < CONFIG.MAP_TILES_Y) {
              const tile = dungeon.getTile(tx, ty);
              if (tile === TILES.WALL || tile === TILES.DOOR_LOCKED) { blockedY = true; break; }
            }
          }
        }
      }

      if (!blockedX) this.x = nx;
      else this.vx = 0;
      if (!blockedY) this.y = ny;
      else this.vy = 0;

      // Walk cycle animation
      if (movement.dx !== 0 || movement.dy !== 0) {
        this.walkCycleFrame += dt * 6;
      }

      // Hazard tile damage
      const ptx = Math.floor((this.x + this.width / 2) / CONFIG.TILE_SIZE);
      const pty = Math.floor((this.y + this.height / 2) / CONFIG.TILE_SIZE);
      if (ptx >= 0 && ptx < CONFIG.MAP_TILES_X && pty >= 0 && pty < CONFIG.MAP_TILES_Y) {
        if (dungeon.getTile(ptx, pty) === TILES.HAZARD && this.hazardCooldown <= 0) {
          dungeon.particles.spawnSpark(this.x + this.width / 2, this.y + this.height / 2, 0, -50, 230, 81, 0, 4, 0.3);
          this.takeDamage(2, 0);
          this.hazardCooldown = CONFIG.HAZARD_COOLDOWN;
        }
      }

      // Check exit tile (triggers victory)
      if (ptx >= 0 && ptx < CONFIG.MAP_TILES_X && pty >= 0 && pty < CONFIG.MAP_TILES_Y) {
        if (dungeon.getTile(ptx, pty) === TILES.EXIT) {
          dungeon.triggerVictory();
        }
      }

      // Check door passage (unlock unlocked doors automatically)
      // Check room transition (doors between rooms)
      this.checkRoomTransition(dungeon);
    }

    // Timers
    if (this.hitFlashTimer > 0) this.hitFlashTimer -= dt;
    if (this.invincibleFrames > 0) this.invincibleFrames -= dt;
    if (this.attackCooldown > 0) this.attackCooldown -= dt;
    if (this.hazardCooldown > 0) this.hazardCooldown -= dt;
    if (this.levelUpAnimTimer > 0) this.levelUpAnimTimer -= dt;

    // Idle bob animation when not moving/attacking
    if (!this.isAttacking && movement.dx === 0 && movement.dy === 0) {
      this.idleBobPhase += dt * 2;
    }

    // Attack input (Space bar)
    if (input.wasPressed("Space") && !this.isAttacking && this.attackCooldown <= 0) {
      this.isAttacking = true;
      this.attackAnimProgress = 0;
      this.attackAngle = 0;
      const weaponSpeed = this.currentWeapon.speedMultiplier || 1.0;
      this.attackCooldown = CONFIG.ATTACK_COOLDOWN * weaponSpeed;
      dungeon.audio.playSFX("swordWhoosh");
    }
  }

  /** Check if player is at a room transition (door between rooms) */
  checkRoomTransition(dungeon) {
    const cx = Math.floor((this.x + this.width / 2) / CONFIG.TILE_SIZE);
    const cy = Math.floor((this.y + this.height / 2) / CONFIG.TILE_SIZE);

    // Check for transition doors (tile type that indicates room boundary)
    for (let dy = -1; dy <= 1; dy++) {
      for (let dx = -1; dx <= 1; dx++) {
        const tx = cx + dx, ty = cy + dy;
        if (tx < 0 || tx >= CONFIG.MAP_TILES_X || ty < 0 || ty >= CONFIG.MAP_TILES_Y) continue;
        const tile = dungeon.getTile(tx, ty);

        // Locked door with key: auto-use key from inventory slot 2 (first key found)
        if (tile === TILES.DOOR_LOCKED && this.hasKey()) {
          this.consumeKey();
          dungeon.setTile(tx, ty, TILES.DOOR_UNLOCKED);
          dungeon.audio.playSFX("unlockDoor");
          return;
        }

        // Unlocked door tile indicates a room boundary transition
        if (tile === TILES.DOOR_UNLOCKED) {
          const room = dungeon.getRoomAt(tx, ty);
          if (room && room !== dungeon.currentRoom) {
            dungeon.transitionToRoom(room, cx - tx * CONFIG.TILE_SIZE, cy - ty * CONFIG.TILE_SIZE);
            return;
          }
        }

        // Also handle corridor floor transitions to new rooms
        // Check all 4 adjacent tiles for room boundary markers
      }
    }

    // A simpler approach: if player is very close to a door tile between rooms, transition
    const room = dungeon.getRoomAt(cx, cy);
    if (room) {
      for (const door of room.doors) {
        const dtileX = door.x;
        const dtileY = door.y;
        const px = this.x + this.width / 2;
        const py = this.y + this.height / 2;
        const dist = Math.abs(px - (dtileX * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2)) +
                     Math.abs(py - (dtileY * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2));
        if (dist < CONFIG.TILE_SIZE) {
          // Check which room is through the door
          const nx = dtileX + door.dx;
          const ny = dtileY + door.dy;
          const targetRoom = dungeon.getRoomAt(nx, ny);
          if (targetRoom && targetRoom !== room) {
            if (dungeon.getTile(dtileX, dtileY) === TILES.DOOR_LOCKED) {
              // Check for key usage again at door position
              if (this.hasKey()) {
                this.consumeKey();
                dungeon.setTile(dtileX, dtileY, TILES.DOOR_UNLOCKED);
                dungeon.audio.playSFX("unlockDoor");
                return;
              }
            } else if (dungeon.getTile(dtileX, dtileY) === TILES.DOOR_UNLOCKED) {
              // Move player into the new room
              const targetDoors = targetRoom.doors.filter(d => d.dx === -door.dx && d.dy === -door.dy);
              let doorX, doorY;
              if (targetDoors.length > 0) {
                doorX = targetDoors[0].x * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2 - this.width / 2;
                doorY = targetDoors[0].y * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2 - this.height / 2;
              } else {
                // Fallback: place at center of room
                doorX = (targetRoom.x + Math.floor(targetRoom.w / 2)) * CONFIG.TILE_SIZE;
                doorY = (targetRoom.y + Math.floor(targetRoom.h / 2)) * CONFIG.TILE_SIZE;
              }
              dungeon.transitionToRoom(targetRoom, doorX, doorY);
              return;
            }
          }
        }
      }
    }
  }

  hasKey() {
    for (const item of this.inventory) {
      if (item && item.itemType === "key") return true;
    }
    return false;
  }

  consumeKey() {
    for (let i = 0; i < this.inventory.length; i++) {
      if (this.inventory[i] && this.inventory[i].itemType === "key") {
        this.inventory[i] = null;
        return true;
      }
    }
    return false;
  }

  addToInventory(item) {
    for (let i = 0; i < this.inventory.length; i++) {
      if (!this.inventory[i]) {
        this.inventory[i] = item;
        this.itemsCollected++;
        return true;
      }
    }
    return false; // Inventory full
  }

  pickupItem(item) {
    switch (item.itemType) {
      case "potion": {
        const healed = this.heal(Math.round(this.maxHP * 0.4));
        dungeon.particles.spawnFloatingText(`+${healed}`, this.x + this.width / 2, this.y - 10, 102, 187, 106);
        dungeon.audio.playSFX("pickupPotion");
        return true;
      }
      case "key": {
        if (this.addToInventory(item)) {
          dungeon.particles.spawnFloatingText("Key!", this.x + this.width / 2, this.y - 10, 255, 213, 79);
          dungeon.audio.playSFX("pickupKey");
          return true;
        }
        break;
      }
      case "weapon": {
        if (this.addToInventory(item)) {
          dungeon.particles.spawnFloatingText(`Found ${item.value.name}!`, this.x + this.width / 2, this.y - 10, 176, 190, 197);
          dungeon.audio.playSFX("pickupKey");
          return true;
        }
        break;
      }
    }
    return false;
  }

  useItem(slotIndex) {
    if (slotIndex < 0 || slotIndex >= this.inventory.length) return false;
    const item = this.inventory[slotIndex];
    if (!item) return false;

    switch (item.itemType) {
      case "potion": {
        const healed = this.heal(Math.round(this.maxHP * 0.4));
        dungeon.particles.spawnFloatingText(`+${healed}`, this.x + this.width / 2, this.y - 10, 102, 187, 106);
        dungeon.audio.playSFX("pickupPotion");
        this.inventory[slotIndex] = null;
        return true;
      }
      case "weapon": {
        this.equipWeapon(item.value);
        dungeon.particles.spawnFloatingText(`Equipped ${item.value.name}!`, this.x + this.width / 2, this.y - 10, 176, 190, 197);
        return true;
      }
    }
    return false;
  }

  render(renderer) {
    if (this.dead) return;
    const ctx = renderer.ctx;
    const cx = this.getCenterX();
    const cy = this.getCenterY() + Math.sin(this.idleBobPhase) * 2; // idle bob

    const hs = 12; // half-size for drawing relative to center
    const color = "#4fc3f7";
    const darkColor = "#0288d1";

    ctx.save();

    // Draw body (cyan knight silhouette)
    ctx.fillStyle = color;
    // Main body - rounded torso
    ctx.beginPath();
    ctx.ellipse(cx, cy + 4, hs * 0.7, hs * 0.8, 0, 0, Math.PI * 2);
    ctx.fill();

    // Helmet (darker)
    ctx.fillStyle = darkColor;
    ctx.beginPath();
    ctx.ellipse(cx, cy - 8, hs * 0.5, hs * 0.4, 0, 0, Math.PI * 2);
    ctx.fill();

    // Visor slit
    ctx.fillStyle = "#01579b";
    const facingOffset = this.facing === 3 ? -3 : (this.facing === 1 ? 3 : 0);
    ctx.fillRect(cx + facingOffset - 4, cy - 9, 8, 2);

    // Shield on left side
    ctx.fillStyle = "#039be5";
    const shieldX = this.facing === 3 ? cx - hs * 0.6 : cx + (this.facing === 1 ? hs * 0.6 : cx - hs * 0.7);
    if (this.facing !== 3) {
      ctx.beginPath();
      ctx.arc(cx + hs * 0.5, cy + 2, 7, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#4fc3f7";
      ctx.beginPath();
      ctx.arc(cx + hs * 0.5, cy + 2, 4, 0, Math.PI * 2);
      ctx.fill();
    }

    // Legs with walk animation
    const legOffset = Math.sin(this.walkCycleFrame) * 3;
    ctx.fillStyle = darkColor;
    ctx.fillRect(cx - 5, cy + hs * 0.5, 4, 8 + legOffset);
    ctx.fillRect(cx + 1, cy + hs * 0.5, 4, 8 - legOffset);

    // Draw sword based on facing direction and attack state
    this.drawSword(renderer, cx, cy);

    // White flash overlay when hit
    if (this.hitFlashTimer > 0) {
      ctx.fillStyle = `rgba(255,255,255,${this.hitFlashTimer * 3})`;
      ctx.beginPath();
      ctx.ellipse(cx, cy, hs + 4, hs + 4, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // Level up golden glow
    if (this.levelUpAnimTimer > 0) {
      const ga = this.levelUpAnimTimer / 1.5;
      renderer.drawGlow(cx, cy, 40 + (1 - ga) * 30, `rgba(255,216,53,${ga * 0.3})`);
    }

    ctx.restore();
  }

  drawSword(renderer, cx, cy) {
    const ctx = renderer.ctx;
    const swordLen = this.isAttacking ? CONFIG.TILE_SIZE * 1.2 : 18;
    let angle = 0;

    if (this.isAttacking) {
      // Sword swing arc
      const baseAngles = [Math.PI, Math.PI / 2, 0, -Math.PI / 2]; // up, right, down, left
      const a = baseAngles[this.facing] + this.attackAngle;
      ctx.strokeStyle = this.currentWeapon.color;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(cx, cy, swordLen * 0.8, a - Math.PI * 0.4, a);
      ctx.stroke();

      // Sword tip glow during attack
      const tipX = cx + Math.cos(a) * swordLen * 0.8;
      const tipY = cy + Math.sin(a) * swordLen * 0.8;
      renderer.drawCircle(tipX, tipY, 4, "rgba(255,255,255,0.6)");
    } else {
      // Sheathed sword pointing in facing direction
      const baseAngle = [Math.PI, Math.PI / 2, 0, -Math.PI / 2][this.facing];
      angle = baseAngle;
      ctx.strokeStyle = this.currentWeapon.color;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(angle) * 8, cy + Math.sin(angle) * 8);
      ctx.lineTo(cx + Math.cos(angle) * swordLen, cy + Math.sin(angle) * swordLen);
      ctx.stroke();

      // Sword guard
      ctx.fillStyle = "#b0bec5";
      const gx = cx + Math.cos(angle) * 10;
      const gy = cy + Math.sin(angle) * 10;
      ctx.fillRect(gx - 3, gy - 1, 6, 2);
    }
  }
}

// ================================================================
// ENEMY BASE CLASS with finite state machine
// States: IDLE, PATROL, CHASE, ATTACK, STAGGER, FLEE, DEATH
// ================================================================
const ENEMY_STATES = Object.freeze({ IDLE: 0, PATROL: 1, CHASE: 2, ATTACK: 3, STAGGER: 4, FLEE: 5, DEATH: 6 });

class Enemy extends Entity {
  constructor(x, y, width, height) {
    super(x, y, width || CONFIG.TILE_SIZE * 0.8, height || CONFIG.TILE_SIZE * 0.8);
    this.state = ENEMY_STATES.IDLE;
    this.maxHP = 3;
    this.curHP = this.maxHP;
    this.speed = 60; // base walk speed px/s
    this.chaseSpeed = 90;
    this.detectionRadius = CONFIG.TILE_SIZE * 4;
    this.attackRange = CONFIG.TILE_SIZE * 1.5;
    this.attackDamage = 2;
    this.attackCooldown = 0.8;
    this.staggerDuration = 0.3;
    this.knockbackForce = 150;

    // Animation
    this.walkWobble = 0;
    this.hurtTimer = 0;
    this.deathAnimTimer = 0;
    this.deathAnimDuration = 0.6;

    // AI timers
    this.patrolTimer = 0;
    this.patrolDirX = 0;
    this.patrolDirY = 0;
    this.attackTimer = 0;
    this.fleeTimer = 0;

    // Drop table (overridden by subclasses)
    this.dropTable = { potion: 0.3 };

    this.room = null;
  }

  getDistanceToPlayer(player) {
    const dx = this.getCenterX() - player.getCenterX();
    const dy = this.getCenterY() - player.getCenterY();
    return Math.sqrt(dx * dx + dy * dy);
  }

  takeDamage(amount) {
    if (this.dead || this.state === ENEMY_STATES.DEATH) return;
    this.curHP -= amount;
    this.hurtTimer = 0.15;

    // Knockback: push away from player
    if (!this.dead) {
      this.vx = (this.x - dungeon.player.x) / this.width * this.knockbackForce;
      this.vy = (this.y - dungeon.player.y) / this.height * this.knockbackForce;
    }

    // Check for death
    if (this.curHP <= 0) {
      this.state = ENEMY_STATES.DEATH;
      this.deathAnimTimer = this.deathAnimDuration;
      return;
    }

    // Enter stagger state briefly, then flee if low HP
    this.state = ENEMY_STATES.STAGGER;
    this.staggerTimer = 0.2;

    if (this.curHP < this.maxHP * 0.2) {
      this.state = ENEMY_STATES.FLEE;
      this.fleeTimer = 1.0;
    }
  }

  getKnockbackVelocity() {
    return { vx: this.vx, vy: this.vy };
  }

  update(dt, dungeon) {
    if (this.dead) return;

    const player = dungeon.player;
    const distToPlayer = this.getDistanceToPlayer(player);

    // Handle death animation
    if (this.state === ENEMY_STATES.DEATH) {
      this.deathAnimTimer -= dt;
      if (this.deathAnimTimer <= 0) {
        this.markDead();
        return;
      }
      return;
    }

    // Handle stagger
    if (this.state === ENEMY_STATES.STAGGER) {
      this.staggerTimer -= dt;
      this.hurtTimer = Math.max(0, this.hurtTimer - dt);
      // Apply knockback with tile collision
      this.applyKnockback(dt, dungeon);
      if (this.staggerTimer <= 0) {
        this.state = ENEMY_STATES.IDLE;
        this.patrolTimer = 0.5;
      }
      return;
    }

    // Handle flee
    if (this.state === ENEMY_STATES.FLEE) {
      this.fleeTimer -= dt;
      // Move away from player
      const awayX = this.x - player.x;
      const awayY = this.y - player.y;
      const awayDist = Math.sqrt(awayX * awayX + awayY * awayY) || 1;
      let nx = this.x + (awayX / awayDist) * this.speed * dt;
      let ny = this.y + (awayY / awayDist) * this.speed * dt;
      this.resolveTileCollision(nx, ny, dungeon);
      this.hurtTimer = Math.max(0, this.hurtTimer - dt);
      if (this.fleeTimer <= 0 && this.curHP > this.maxHP * 0.25) {
        this.state = ENEMY_STATES.IDLE;
        this.patrolTimer = 0.3;
      }
      return;
    }

    // AI state machine update
    const playerInRoom = dungeon.getCurrentRoom() === this.room;
    const canDetect = distToPlayer < this.detectionRadius && playerInRoom && !player.dead;

    if (canDetect) {
      this.state = ENEMY_STATES.CHASE;
    } else if (!canDetect && this.state === ENEMY_STATES.CHASE) {
      this.state = ENEMY_STATES.PATROL;
      this.patrolTimer = 1.0;
    }

    switch (this.state) {
      case ENEMY_STATES.IDLE:
        this.patrolTimer -= dt;
        if (this.patrolTimer <= 0) {
          this.patrolDirX = Math.random() > 0.5 ? (Math.random() > 0.5 ? 1 : -1) : 0;
          this.patrolDirY = this.patrolDirX === 0 ? (Math.random() > 0.5 ? 1 : -1) : 0;
          this.patrolTimer = 1 + Math.random();
        }
        this.x += this.patrolDirX * this.speed * 0.3 * dt;
        this.y += this.patrolDirY * this.speed * 0.3 * dt;
        this.resolveTileCollision(this.x, this.y, dungeon);
        break;

      case ENEMY_STATES.PATROL:
        this.patrolTimer -= dt;
        if (this.patrolTimer <= 0) {
          this.state = ENEMY_STATES.IDLE;
        } else {
          this.x += this.patrolDirX * this.speed * 0.5 * dt;
          this.y += this.patrolDirY * this.speed * 0.5 * dt;
          this.resolveTileCollision(this.x, this.y, dungeon);
        }
        break;

      case ENEMY_STATES.CHASE:
        // Move toward player
        const dx = player.getCenterX() - this.getCenterX();
        const dy = player.getCenterY() - this.getCenterY();
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
        const moveX = (dx / dist) * this.chaseSpeed * dt;
        const moveY = (dy / dist) * this.chaseSpeed * dt;

        let nx = this.x + moveX;
        let ny = this.y + moveY;

        // Check if in attack range
        if (dist < this.attackRange && this.attackTimer <= 0) {
          this.state = ENEMY_STATES.ATTACK;
          this.attackTimer = this.attackCooldown;
          this.performAttack(dungeon, player);
        } else {
          this.resolveTileCollision(nx, ny, dungeon);
        }
        break;

      case ENEMY_STATES.ATTACK:
        this.attackTimer -= dt;
        if (this.attackTimer <= 0) {
          this.state = ENEMY_STATES.CHASE;
        }
        break;
    }

    this.hurtTimer = Math.max(0, this.hurtTimer - dt);
    this.walkWobble += dt * 5;
  }

  resolveTileCollision(nx, ny, dungeon) {
    const ts = CONFIG.TILE_SIZE;
    // Clamp to map bounds
    nx = Math.max(1, Math.min((CONFIG.MAP_TILES_X - 2) * ts, nx));
    ny = Math.max(1, Math.min((CONFIG.MAP_TILES_Y - 2) * ts, ny));

    const ltx = Math.floor(nx / ts);
    const rtx = Math.floor((nx + this.width - 1) / ts);
    const tty = Math.floor(ny / ts);
    const bty = Math.floor((ny + this.height - 1) / ts);

    let blockedX = false, blockedY = false;

    for (let ty = tty; ty <= bty && !blockedX; ty++) {
      if (ty < 0 || ty >= CONFIG.MAP_TILES_Y) { blockedX = true; continue; }
      for (let tx = ltx; tx <= rtx; tx++) {
        if (tx < 0 || tx >= CONFIG.MAP_TILES_X) { blockedX = true; break; }
        const t = dungeon.getTile(tx, ty);
        if (t === TILES.WALL || t === TILES.DOOR_LOCKED) { blockedX = true; break; }
      }
    }

    for (let tx = ltx; tx <= rtx && !blockedY; tx++) {
      if (tx < 0 || tx >= CONFIG.MAP_TILES_X) { blockedY = true; continue; }
      for (let ty = tty; ty <= bty; ty++) {
        if (ty < 0 || ty >= CONFIG.MAP_TILES_Y) { blockedY = true; break; }
        const t = dungeon.getTile(tx, ty);
        if (t === TILES.WALL || t === TILES.DOOR_LOCKED) { blockedY = true; break; }
      }
    }

    if (!blockedX) this.x = nx;
    else nx = this.x; // keep original
    if (!blockedY) this.y = ny;
    else ny = this.y;
  }

  applyKnockback(dt, dungeon) {
    const ts = CONFIG.TILE_SIZE;
    let nx = this.x + this.vx * dt;
    let ny = this.y + this.vy * dt;

    // Reduce velocity
    this.vx *= Math.pow(0.92, dt * 60);
    this.vy *= Math.pow(0.92, dt * 60);

    // Simple collision check
    const ltx = Math.floor(nx / ts);
    const rtx = Math.floor((nx + this.width) / ts);
    const tty = Math.floor(ny / ts);
    const bty = Math.floor((ny + this.height) / ts);

    let blockedX = false, blockedY = false;
    for (let ty = tty; ty <= bty; ty++) {
      for (let tx = ltx; tx <= rtx; tx++) {
        if (tx >= 0 && tx < CONFIG.MAP_TILES_X && ty >= 0 && ty < CONFIG.MAP_TILES_Y) {
          if (dungeon.getTile(tx, ty) === TILES.WALL || dungeon.getTile(tx, ty) === TILES.DOOR_LOCKED) {
            blockedX = true; blockedY = true;
          }
        }
      }
    }

    if (!blockedX) this.x = nx;
    if (!blockedY) this.y = ny;
  }

  performAttack(dungeon, player) { /* override in subclasses */ }

  dropLoot() {
    const drops = [];
    for (const [type, chance] of Object.entries(this.dropTable)) {
      if (Math.random() < chance) {
        const item = this.createItem(type);
        if (item) drops.push(item);
      }
    }
    return drops;
  }

  createItem(type) {
    switch (type) {
      case "potion": return { itemType: "potion", value: Math.round(dungeon.player.maxHP * 0.4), x: 0, y: 0 };
      case "key": return { itemType: "key", value: 1, x: 0, y: 0 };
      default: return null;
    }
  }

  updateDropPositions(dungeon) {
    // Position items near enemy spawn point
  }
}

// ================================================================
// SLIME ENEMY - Green blob melee attacker
// ================================================================
class Slime extends Enemy {
  constructor(x, y, depthMult = 1.0) {
    super(x, y, CONFIG.TILE_SIZE * 0.7, CONFIG.TILE_SIZE * 0.6);
    this.maxHP = Math.round(3 * depthMult);
    this.curHP = this.maxHP;
    this.speed = 45;
    this.chaseSpeed = 80;
    this.detectionRadius = CONFIG.TILE_SIZE * 4;
    this.attackRange = CONFIG.TILE_SIZE * 1.0;
    this.attackDamage = Math.round(2 * depthMult);
    this.attackCooldown = 1.0;
    this.knockbackForce = 100;
    this.dropTable = { potion: 0.3 };
    this.squishPhase = 0;
    this.typeName = "slime";
    this.color = "#4caf50";
    this.colorDark = "#2e7d32";
  }

  update(dt, dungeon) {
    if (this.dead) return;
    super.update(dt, dungeon);

    // Melee contact damage
    if (this.state === ENEMY_STATES.CHASE && !dungeon.player.dead) {
      const dist = this.getDistanceToPlayer(dungeon.player);
      if (dist < (this.width + dungeon.player.width) / 2 && this.attackTimer <= 0) {
        dungeon.player.takeDamage(this.attackDamage, Math.atan2(dungeon.player.y - this.y, dungeon.player.x - this.x));
        dungeon.player.invincibleFrames = CONFIG.PLAYER_INVINCIBILITY_FRAMES;
        dungeon.audio.playSFX("playerHit");
        dungeon.particles.spawnExplosion(
          (this.x + dungeon.player.x) / 2 + CONFIG.TILE_SIZE / 2,
          (this.y + dungeon.player.y) / 2 + CONFIG.TILE_SIZE / 2,
          5, 76, 175, 80, 60, 0.3
        );
        this.attackTimer = this.attackCooldown;
      }
    }
  }

  performAttack(dungeon, player) {
    // Melee lunge
    const dx = player.getCenterX() - this.getCenterX();
    const dy = player.getCenterY() - this.getCenterY();
    const dist = Math.sqrt(dx * dx + dy * dy) || 1;
    this.x += (dx / dist) * CONFIG.TILE_SIZE * 0.5;
    this.y += (dy / dist) * CONFIG.TILE_SIZE * 0.5;
  }

  render(renderer) {
    const ctx = renderer.ctx;
    const cx = this.getCenterX();
    const cy = this.getCenterY();
    const wobble = Math.sin(this.walkWobble) * 2;

    // Squish animation: body bobs and deforms
    this.squishPhase += 0.05;
    const squishY = Math.abs(Math.sin(this.squishPhase)) * 3;

    ctx.save();
    ctx.translate(cx, cy + squishY);

    // Main body - green blob shape
    if (this.hurtTimer > 0) {
      ctx.fillStyle = "#ffffff";
    } else {
      ctx.fillStyle = this.color;
    }
    ctx.beginPath();
    ctx.ellipse(0, 0, this.width / 2 + squishY * 2, this.height / 2 - squishY, 0, 0, Math.PI * 2);
    ctx.fill();

    // Darker bottom half for depth
    ctx.fillStyle = this.colorDark;
    ctx.beginPath();
    ctx.ellipse(0, this.height * 0.15, this.width / 2 - 1, this.height / 3, 0, 0, Math.PI);
    ctx.fill();

    // Eyes
    const eyeY = -this.height * 0.2;
    const eyeSpacing = 4;
    ctx.fillStyle = "#1b5e20";
    ctx.beginPath();
    ctx.arc(-eyeSpacing, eyeY, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(eyeSpacing, eyeY, 2, 0, Math.PI * 2);
    ctx.fill();

    // White eye shine
    ctx.fillStyle = "#ffffff";
    ctx.beginPath();
    ctx.arc(-eyeSpacing + 1, eyeY - 1, 1, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(eyeSpacing + 1, eyeY - 1, 1, 0, Math.PI * 2);
    ctx.fill();

    // Death dissolve effect
    if (this.state === ENEMY_STATES.DEATH) {
      const progress = 1 - this.deathAnimTimer / this.deathAnimDuration;
      ctx.globalAlpha = 1 - progress;
      for (let i = 0; i < 5; i++) {
        ctx.fillStyle = this.color;
        ctx.beginPath();
        const angle = (Math.PI * 2 / 5) * i + progress * Math.PI;
        const r = progress * 20;
        ctx.arc(Math.cos(angle) * r, Math.sin(angle) * r, 3 * (1 - progress), 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // HP bar above head
    if (this.curHP < this.maxHP && this.state !== ENEMY_STATES.DEATH) {
      const barW = this.width;
      const barH = 3;
      const barY = -this.height / 2 - 8 + squishY;
      ctx.fillStyle = "#1a1a1a";
      ctx.fillRect(-barW / 2, barY, barW, barH);
      ctx.fillStyle = "#e53935";
      ctx.fillRect(-barW / 2, barY, barW * (this.curHP / this.maxHP), barH);
    }

    ctx.restore();
  }
}

// ================================================================
// SKELETON ARCHER ENEMY - Ranged attacker with bow
// ================================================================
class SkeletonArcher extends Enemy {
  constructor(x, y, depthMult = 1.0) {
    super(x, y, CONFIG.TILE_SIZE * 0.7, CONFIG.TILE_SIZE * 0.9);
    this.maxHP = Math.round(4 * depthMult);
    this.curHP = this.maxHP;
    this.speed = 35;
    this.chaseSpeed = 60;
    this.detectionRadius = CONFIG.TILE_SIZE * 6;
    this.attackRange = CONFIG.TILE_SIZE * 5;
    this.attackDamage = Math.round(2 * depthMult);
    this.attackCooldown = 1.5;
    this.knockbackForce = 80;
    this.dropTable = { potion: 0.2, key: 0.2 };
    this.typeName = "skeleton";
    this.color = "#eeeeee";
    this.eyeColor = "#ff5722";
    this.bowDrawPhase = 0;
    this.shootingTimer = 1.5;
    this.projectileSpeed = 200; // px/s
  }

  update(dt, dungeon) {
    if (this.dead) return;
    super.update(dt, dungeon);

    // Check for projectiles hitting the player
    if (this.state === ENEMY_STATES.ATTACK && this.attackTimer < this.attackCooldown - 0.3) {
      // Fire projectile toward player
      const dx = dungeon.player.getCenterX() - this.getCenterX();
      const dy = dungeon.player.getCenterY() - this.getCenterY();
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > 0) {
        const proj = new Projectile(
          this.getCenterX(), this.getCenterY(),
          (dx / dist) * this.projectileSpeed,
          (dy / dist) * this.projectileSpeed,
          this.attackDamage, 3.0, this
        );
        dungeon.projectiles.push(proj);
      }
    }

    // Retreat when player is too close
    if (dungeon.player && !dungeon.player.dead) {
      const dist = this.getDistanceToPlayer(dungeon.player);
      if (dist < CONFIG.TILE_SIZE * 2 && this.state !== ENEMY_STATES.STAGGER && this.state !== ENEMY_STATES.DEATH) {
        // Move away from player
        const ax = this.x - dungeon.player.x;
        const ay = this.y - dungeon.player.y;
        const adist = Math.sqrt(ax * ax + ay * ay) || 1;
        let nx = this.x + (ax / adist) * this.speed * dt;
        let ny = this.y + (ay / adist) * this.speed * dt;
        this.resolveTileCollision(nx, ny, dungeon);
      }
    }

    // Bow draw animation
    if (this.state === ENEMY_STATES.ATTACK) {
      this.bowDrawPhase += dt * 8;
      this.shootingTimer -= dt;
      if (this.shootingTimer <= 0) {
        this.state = ENEMY_STATES.CHASE;
        this.shootingTimer = this.attackCooldown;
      }
    }
  }

  performAttack(dungeon, player) {
    this.state = ENEMY_STATES.ATTACK;
    this.attackTimer = this.attackCooldown;
    this.shootingTimer = 0.5; // Telegraph time before firing
  }

  render(renderer) {
    const ctx = renderer.ctx;
    const cx = this.getCenterX();
    const cy = this.getCenterY();
    const wobble = Math.sin(this.walkWobble) * 2;

    ctx.save();
    ctx.translate(cx, cy);

   if (this.hurtTimer <= 0) {
      ctx.fillStyle = this.color;
    } else {
      ctx.fillStyle = "#ffffff";
    }

    // Head (skull shape)
    ctx.beginPath();
    ctx.ellipse(0, -12, 8, 9, 0, 0, Math.PI * 2);
    ctx.fill();

    // Glowing eyes
    if (this.hurtTimer <= 0) {
      const eyeGlow = Math.sin(Date.now() * 0.005) * 0.3 + 0.7;
      ctx.fillStyle = `rgba(255,87,34,${eyeGlow})`;
    } else {
      ctx.fillStyle = "#ff5722";
    }
    ctx.beginPath();
    ctx.arc(-3, -13, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(3, -13, 2.5, 0, Math.PI * 2);
    ctx.fill();

    // Eye shine
    ctx.fillStyle = "#fff";
    ctx.beginPath();
    ctx.arc(-2, -14, 1, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(4, -14, 1, 0, Math.PI * 2);
    ctx.fill();

    // Body (ribcage)
    if (!this.hurtTimer > 0 || this.dead) {
      ctx.fillStyle = "#eeeeee";
    } else {
      ctx.fillStyle = "#ffffff";
    }
    ctx.fillRect(-3, -4, 6, 14);

    // Ribs
    for (let i = 0; i < 3; i++) {
      const ry = -2 + i * 5;
      ctx.strokeStyle = this.hurtTimer > 0 ? "#ffffff" : "#cccccc";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(-6, ry);
      ctx.lineTo(6, ry);
      ctx.stroke();
    }

    // Legs
    const legOff = Math.sin(this.walkWobble) * 3;
    ctx.strokeStyle = this.hurtTimer > 0 ? "#ffffff" : "#cccccc";
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(-3, 10);
    ctx.lineTo(-4 - legOff, 16);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(3, 10);
    ctx.lineTo(4 + legOff, 16);
    ctx.stroke();

    // Arms and bow
    const armAngle = this.state === ENEMY_STATES.ATTACK ? Math.sin(this.bowDrawPhase) * 0.8 : -0.3;
    const bowX = Math.cos(armAngle) * 12;
    const bowY = Math.sin(armAngle) * 8;

    // Draw bow
    ctx.strokeStyle = "#8d6e63";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(bowX + 8, bowY, 10, -Math.PI * 0.5, Math.PI * 0.5);
    ctx.stroke();

    // Bow string (drawn back when aiming)
    if (this.state === ENEMY_STATES.ATTACK) {
      const drawAmount = Math.abs(Math.sin(this.bowDrawPhase));
      ctx.strokeStyle = "#d7ccc8";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(bowX + 18, bowY - 9);
      ctx.lineTo(bowX + 8 - drawAmount * 8, bowY);
      ctx.lineTo(bowX + 18, bowY + 9);
      ctx.stroke();

      // Arrow nocked
      if (drawAmount > 0.5) {
        ctx.strokeStyle = "#bdbdbd";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(bowX + 8 - drawAmount * 8, bowY);
        ctx.lineTo(bowX + 20, bowY);
        ctx.stroke();
      }
    }

    // Arms
    ctx.strokeStyle = this.hurtTimer > 0 ? "#ffffff" : "#eeeeee";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-3, -2);
    ctx.lineTo(-8, 4);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(3, -2);
    ctx.lineTo(bowX + 5, bowY);
    ctx.stroke();

    // Death dissolution effect (bone fragments)
    if (this.state === ENEMY_STATES.DEATH) {
      const progress = 1 - this.deathAnimTimer / this.deathAnimDuration;
      ctx.globalAlpha = Math.max(0, 1 - progress);
      for (let i = 0; i < 8; i++) {
        const angle = (Math.PI * 2 / 8) * i + progress * 3;
        const r = progress * 30;
        ctx.fillStyle = "#eeeeee";
        ctx.save();
        ctx.translate(Math.cos(angle) * r, Math.sin(angle) * r);
        ctx.rotate(angle);
        ctx.fillRect(-2, -1, 4, 2);
        ctx.restore();
      }
    }

    // HP bar
    if (this.curHP < this.maxHP && this.state !== ENEMY_STATES.DEATH) {
      const barW = this.width;
      const barH = 3;
      const barY = -this.height / 2 - 10;
      ctx.fillStyle = "#1a1a1a";
      ctx.fillRect(-barW / 2, barY, barW, barH);
      ctx.fillStyle = "#e53935";
      ctx.fillRect(-barW / 2, barY, barW * (this.curHP / this.maxHP), barH);
    }

    ctx.restore();
  }
}

// ================================================================
// MINI-BOSS ENEMY - Powerful foe with multiple attack patterns
// Phase 1 (HP > 50%): Charge attacks
// Phase 2 (HP < 50%): Area slam + minion summon
// ================================================================
class MiniBoss extends Enemy {
  constructor(x, y, depthMult = 1.0) {
    super(x, y, CONFIG.TILE_SIZE * 1.5, CONFIG.TILE_SIZE * 1.5);
    this.maxHP = Math.round(45 * depthMult);
    this.curHP = this.maxHP;
    this.speed = 55;
    this.chaseSpeed = 90;
    this.detectionRadius = CONFIG.TILE_SIZE * 8;
    this.attackRange = CONFIG.TILE_SIZE * 2.5;
    this.attackDamage = Math.round(4 * depthMult);
    this.attackCooldown = 1.2;
    this.knockbackForce = 200;
    this.dropTable = { weapon: 1.0 }; // guaranteed weapon drop
    this.typeName = "miniboss";
    this.color = "#b71c1c";
    this.colorDark = "#880e4f";
    this.phase = 1;
    this.isCharging = false;
    this.chargeTargetX = 0;
    this.chargeTargetY = 0;
    this.chargeTimer = 0;
    this.slamTelegraphTimer = 0;
    this.slamReady = false;
    this.minionSummonTimer = 3.0;
    this.auraPhase = 0;

    // Attack telegraph visuals
    this.telegraphGlow = 0;
  }

  update(dt, dungeon) {
    if (this.dead) return;
    const player = dungeon.player;
    const distToPlayer = this.getDistanceToPlayer(player);

    super.update(dt, dungeon);
    if (this.state !== ENEMY_STATES.IDLE && this.state !== ENEMY_STATES.CHASE) return;

    // Check for phase transition
    if (this.phase === 1 && this.curHP < this.maxHP * 0.5) {
      this.phase = 2;
      this.telegraphGlow = 1.0;
    }

    // Aura particles
    this.auraPhase += dt * 3;
    if (Math.random() < 0.3) {
      const angle = Math.random() * Math.PI * 2;
      const r = this.width * 0.7 + Math.sin(this.auraPhase) * 5;
      dungeon.particles.spawnTrail(
        this.getCenterX() + Math.cos(angle) * r,
        this.getCenterY() + Math.sin(angle) * r,
        this.color === 1 ? 183 : 26, this.color === 28 ? 183 : 51, this.color === 49 ? 183 : 28
      );
    }

    if (this.isCharging) {
      // Moving toward charge target
      const dx = this.chargeTargetX - this.x;
      const dy = this.chargeTargetY - this.y;
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;
      this.x += (dx / dist) * this.chaseSpeed * 3 * dt;
      this.y += (dy / dist) * this.chaseSpeed * 3 * dt;
      this.chargeTimer -= dt;

      // Trail particles while charging
      dungeon.particles.spawnTrail(this.getCenterX(), this.getCenterY(), 231, 28, 0, 5);

      if (dist < CONFIG.TILE_SIZE || this.chargeTimer <= 0) {
        this.isCharging = false;
        // Impact damage on charge hit
        if (!player.dead && dist < CONFIG.TILE_SIZE * 1.5) {
          player.takeDamage(this.attackDamage, Math.atan2(dy, dx));
          player.invincibleFrames = CONFIG.PLAYER_INVINCIBILITY_FRAMES;
          dungeon.audio.playSFX("hitImpact", { vol: 0.6 });
          dungeon.screenShake(8);
          dungeon.particles.spawnExplosion(player.getCenterX(), player.getCenterY(), 15, 231, 28, 0, 120, 0.5);
        }
        this.state = ENEMY_STATES.CHASE;
      }
      return;
    }

    // Area slam telegraph (Phase 2)
    if (this.phase === 2 && !player.dead) {
      this.slamTelegraphTimer -= dt;
      if (this.slamTelegraphTimer <= 0) {
        const dx = player.getCenterX() - this.getCenterX();
        const dy = player.getCenterY() - this.getCenterY();
        this.chargeTargetX = this.x + dx;
        this.chargeTargetY = this.y + dy;
        this.isCharging = true;
        this.chargeTimer = 0.5; // Telegraph time
        this.state = ENEMY_STATES.STAGGER;
      }
    }

    // Minion summon (Phase 2)
    if (this.phase === 2) {
      this.minionSummonTimer -= dt;
      if (this.minionSummonTimer <= 0 && dungeon.getCurrentRoom().enemies.length < 6) {
        const minion = new Slime(this.x + (Math.random() - 0.5) * 30, this.y + (Math.random() - 0.5) * 30, depthMult);
        dungeon.getCurrentRoom().enemies.push(minion);
        this.minionSummonTimer = 8.0;
        dungeon.particles.spawnExplosion(this.getCenterX(), this.getCenterY(), 10, 183, 28, 28, 80, 0.5);
      }
    }

    // Phase 1: Charge attacks when player is far
    if (this.phase === 1 && distToPlayer > CONFIG.TILE_SIZE * 4) {
      const dx = player.getCenterX() - this.getCenterX();
      const dy = player.getCenterY() - this.getCenterY();
      this.chargeTargetX = this.x + dx;
      this.chargeTargetY = this.y + dy;
      this.isCharging = true;
      this.chargeTimer = 1.0;
      this.state = ENEMY_STATES.STAGGER; // Telegraph for a moment
    } else if (distToPlayer < CONFIG.TILE_SIZE * 3) {
      // Move toward player slowly when close in phase 1
      const dx = player.getCenterX() - this.getCenterX();
      const dy = player.getCenterY() - this.getCenterY();
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;
      let nx = this.x + (dx / dist) * this.chaseSpeed * dt;
      let ny = this.y + (dy / dist) * this.chaseSpeed * dt;
      this.resolveTileCollision(nx, ny, dungeon);
    }

    // Glow effect during telegraph
    if (this.state === ENEMY_STATES.STAGGER) {
      this.telegraphGlow += dt * 3;
    } else {
      this.telegraphGlow *= Math.pow(0.92, dt * 60);
    }
  }

  performAttack(dungeon, player) {
    // Melee lunge for phase 1 close combat
    if (this.phase === 1) {
      const dx = player.getCenterX() - this.getCenterX();
      const dy = player.getCenterY() - this.getCenterY();
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;
      this.x += (dx / dist) * CONFIG.TILE_SIZE * 0.3;
      this.y += (dy / dist) * CONFIG.TILE_SIZE * 0.3;
    }
  }

  render(renderer) {
    const ctx = renderer.ctx;
    const cx = this.getCenterX();
    const cy = this.getCenterY();
    const s = this.width / 2; // half-width for drawing

    ctx.save();
    ctx.translate(cx, cy);

    if (this.hurtTimer > 0) {
      ctx.fillStyle = "#ffffff";
    } else {
      ctx.fillStyle = this.color;
    }

    // Aura glow effect
    const auraIntensity = Math.sin(this.auraPhase * 2) * 0.15 + 0.2;
    renderer.drawGlow(0, 0, s + 10, `rgba(${this.hurtTimer > 0 ? "255,255,255" : "183,28,28"},${auraIntensity})`);

    // Telegraph glow (before charge/slam)
    if (this.telegraphGlow > 0.01) {
      renderer.drawGlow(0, 0, s + 20, `rgba(255,${this.isCharging ? "100" : "216"},53,${this.telegraphGlow * 0.4})`);
    }

    // Body - large menacing figure
    ctx.fillStyle = this.hurtTimer > 0 ? "#ffffff" : this.color;
    ctx.beginPath();
    ctx.moveTo(-s * 0.7, -s * 0.3);
    ctx.lineTo(-s * 0.8, s * 0.5);
    ctx.lineTo(-s * 0.4, s * 0.9);
    ctx.lineTo(s * 0.4, s * 0.9);
    ctx.lineTo(s * 0.8, s * 0.5);
    ctx.lineTo(s * 0.7, -s * 0.3);
    ctx.closePath();
    ctx.fill();

    // Darker chest armor
    ctx.fillStyle = this.hurtTimer > 0 ? "#ffffff" : this.colorDark;
    ctx.beginPath();
    ctx.moveTo(-s * 0.4, -s * 0.2);
    ctx.lineTo(-s * 0.5, s * 0.3);
    ctx.lineTo(0, s * 0.4);
    ctx.lineTo(s * 0.5, s * 0.3);
    ctx.lineTo(s * 0.4, -s * 0.2);
    ctx.closePath();
    ctx.fill();

    // Horned helmet
    if (this.hurtTimer <= 0) {
      ctx.fillStyle = "#880e4f";
    } else {
      ctx.fillStyle = "#ffffff";
    }
    // Helmet dome
    ctx.beginPath();
    ctx.ellipse(0, -s * 0.4, s * 0.5, s * 0.35, 0, Math.PI, Math.PI * 2);
    ctx.fill();

    // Left horn
    ctx.strokeStyle = this.hurtTimer > 0 ? "#ffffff" : "#b71c1c";
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(-s * 0.3, -s * 0.6);
    ctx.lineTo(-s * 0.5, -s * 1.0);
    ctx.stroke();

    // Right horn
    ctx.beginPath();
    ctx.moveTo(s * 0.3, -s * 0.6);
    ctx.lineTo(s * 0.5, -s * 1.0);
    ctx.stroke();

    // Glowing eyes (red)
    const eyePulse = Math.sin(Date.now() * 0.008) * 0.3 + 0.7;
    ctx.fillStyle = `rgba(255,${Math.round(100 * eyePulse)},${Math.round(50 * eyePulse)},1)`;
    ctx.beginPath();
    ctx.arc(-s * 0.18, -s * 0.45, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(s * 0.18, -s * 0.45, 3, 0, Math.PI * 2);
    ctx.fill();

    // Massive sword in hand
    const swordAngle = this.isCharging ? -0.5 : Math.sin(this.walkWobble) * 0.1;
    ctx.save();
    ctx.rotate(swordAngle);
    ctx.strokeStyle = "#9e9e9e";
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.moveTo(s * 0.6, s * 0.2);
    ctx.lineTo(s * 1.2, -s * 0.3);
    ctx.stroke();
    // Sword tip glow when charging
    if (this.isCharging) {
      renderer.drawGlow(s * 1.2, -s * 0.3, 8, "rgba(255,100,50,0.5)");
    }
    ctx.restore();

    // Second arm/sword for intimidation
    ctx.strokeStyle = "#9e9e9e";
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(-s * 0.6, s * 0.2);
    ctx.lineTo(-s * 1.0, -s * 0.1);
    ctx.stroke();

    // Death explosion effect
    if (this.state === ENEMY_STATES.DEATH) {
      const progress = 1 - this.deathAnimTimer / this.deathAnimDuration;
      ctx.globalAlpha = Math.max(0, 1 - progress);

      // Massive particle explosion rings
      for (let ring = 0; ring < 3; ring++) {
        const r = progress * (40 + ring * 20);
        ctx.strokeStyle = `rgba(${ring % 2 === 0 ? "183,28,28" : "183,28,79"},${1 - progress})`;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(0, 0, r, 0, Math.PI * 2);
        ctx.stroke();
      }

      // Bone fragment shards
      for (let i = 0; i < 12; i++) {
        const angle = (Math.PI * 2 / 12) * i + progress * 5;
        const fragR = progress * 50;
        ctx.fillStyle = `rgba(238,238,238,${1 - progress})`;
        ctx.save();
        ctx.translate(Math.cos(angle) * fragR, Math.sin(angle) * fragR);
        ctx.rotate(angle + progress * 10);
        ctx.fillRect(-4, -2, 8, 4);
        ctx.restore();
      }
    }

    // Large HP bar
    if (this.curHP < this.maxHP && this.state !== ENEMY_STATES.DEATH) {
      const barW = this.width * 1.5;
      const barH = 6;
      const barY = -this.height / 2 - 16;
      ctx.fillStyle = "#1a1a2e";
      ctx.fillRect(-barW / 2, barY, barW, barH);
      ctx.fillStyle = this.curHP < this.maxHP * 0.3 ? "#c62828" : "#e53935";
      ctx.fillRect(-barW / 2, barY, barW * (this.curHP / this.maxHP), barH);
      ctx.strokeStyle = "#4fc3f7";
      ctx.lineWidth = 1;
      ctx.strokeRect(-barW / 2, barY, barW, barH);
    }

    // Phase indicator
    if (this.phase === 2 && this.state !== ENEMY_STATES.DEATH) {
      ctx.fillStyle = "rgba(183,28,28,0.5)";
      ctx.font = "bold 10px monospace";
      ctx.textAlign = "center";
      ctx.fillText("PHASE 2", 0, -this.height / 2 - 24);
    }

    ctx.restore();
  }
}

// ================================================================
// PROJECTILE CLASS (extends Entity)
// Ranged attack projectiles fired by enemies
// ================================================================
class Projectile extends Entity {
  constructor(x, y, vx, vy, damage, lifetime, owner) {
    super(x - 4, y - 4, 8, 8); // smaller hitbox for dodgeability
    this.vx = vx;
    this.vy = vy;
    this.damage = damage;
    this.lifetime = lifetime;
    this.owner = owner;
    this.rotation = 0;
    this.trailTimer = 0;
  }

  update(dt, dungeon) {
    this.lifetime -= dt;
    if (this.lifetime <= 0) { this.markDead(); return; }

    // Store previous position for sweep test
    const prevX = this.x;
    const prevY = this.y;
    this.x += this.vx * dt;
    this.y += this.vy * dt;

    // Trail particles
    this.trailTimer -= dt;
    if (this.trailTimer <= 0) {
      dungeon.particles.spawnTrail(this.getCenterX(), this.getCenterY(), 255, 109, 0, 3);
      this.trailTimer = 0.05;
    }

    this.rotation += dt * 10;

    // Sweep test: check if line from prev to new position hits any wall
    const startX = prevX + 4;
    const startY = prevY + 4;
    const endX = this.x + 4;
    const endY = this.y + 4;

    // Check wall tiles along the path
    const ts = CONFIG.TILE_SIZE;
    let hitWall = false;

    if (Math.abs(endX - startX) > ts || Math.abs(endY - startY) > ts) {
      // Multi-tile travel, check intermediate tiles
      const steps = Math.max(1, Math.ceil(Math.sqrt((endX - startX) ** 2 + (endY - startY) ** 2) / ts));
      for (let i = 0; i <= steps; i++) {
        const t = i / steps;
        const checkX = startX + (endX - startX) * t;
        const checkY = startY + (endY - startY) * t;
        const tx = Math.floor(checkX / ts);
        const ty = Math.floor(checkY / ts);
        if (tx >= 0 && tx < CONFIG.MAP_TILES_X && ty >= 0 && ty < CONFIG.MAP_TILES_Y) {
          if (dungeon.getTile(tx, ty) === TILES.WALL) {
            hitWall = true;
            break;
          }
        }
      }
    }

    // Check individual tiles along path for short travel
    if (!hitWall) {
      const startTileX = Math.floor(startX / ts);
      const startTileY = Math.floor(startY / ts);
      const endTileX = Math.floor(endX / ts);
      const endTileY = Math.floor(endY / ts);

      for (let ty = Math.min(startTileY, endTileY); ty <= Math.max(startTileY, endTileY); ty++) {
        for (let tx = Math.min(startTileX, endTileX); tx <= Math.max(startTileX, endTileX); tx++) {
          if (tx >= 0 && tx < CONFIG.MAP_TILES_X && ty >= 0 && ty < CONFIG.MAP_TILES_Y) {
            if (dungeon.getTile(tx, ty) === TILES.WALL) {
              hitWall = true;
              break;
            }
          }
        }
        if (hitWall) break;
      }
    }

    if (hitWall) {
      this.markDead();
      dungeon.particles.spawnExplosion(this.x + 4, this.y + 4, 5, 255, 109, 0, 60, 0.3);
      return;
    }

    // Check player collision
    const player = dungeon.player;
    if (!player.dead && this.isColliding(player)) {
      player.takeDamage(this.damage, Math.atan2(this.vy, this.vx));
      player.invincibleFrames = CONFIG.PLAYER_INVINCIBILITY_FRAMES;
      dungeon.audio.playSFX("playerHit");
      dungeon.particles.spawnExplosion(this.getCenterX(), this.getCenterY(), 8, 255, 109, 0, 80, 0.4);
      this.markDead();
    }
  }

  render(renderer) {
    const ctx = renderer.ctx;
    const cx = this.x + 4;
    const cy = this.y + 4;

    // Glow outline
    const glowSize = 8 + Math.sin(Date.now() * 0.01) * 2;
    renderer.drawGlow(cx, cy, glowSize, "rgba(255,109,0,0.3)");

    // Core projectile (orange circle with white center)
    ctx.fillStyle = "#ff6d00";
    ctx.beginPath();
    ctx.arc(cx, cy, 4, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "#ffffff";
    ctx.beginPath();
    ctx.arc(cx, cy, 2, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ================================================================
// ITEM ON GROUND (extends Entity) - Pickupable drops
// Types: POTION, KEY, WEAPON
// ================================================================
class GroundItem extends Entity {
  constructor(x, y, itemType, value) {
    super(x, y, CONFIG.TILE_SIZE * 0.5, CONFIG.TILE_SIZE * 0.5);
    this.itemType = itemType; // "potion", "key", "weapon"
    this.value = value; // healing amount for potions, weapon object for weapons
    this.bobPhase = Math.random() * Math.PI * 2;
    this.collected = false;
    this.color = this.getColor();
  }

  getColor() {
    switch (this.itemType) {
      case "potion": return "#66bb6a"; // bright emerald green
      case "key": return "#ffd54f";    // gold/yellow
      case "weapon": return "#b0bec5"; // silver
      default: return "#ffffff";
    }
  }

  update(dt, dungeon) {
    this.bobPhase += dt * 3;

    // Check pickup by player walking adjacent
    if (!this.collected && !dungeon.player.dead) {
      const dx = this.getCenterX() - dungeon.player.getCenterX();
      const dy = this.getCenterY() - dungeon.player.getCenterY();
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < CONFIG.TILE_SIZE * 1.2) { // ~1 tile distance pickup
        this.collected = true;

        if (this.itemType === "potion") {
          dungeon.player.pickupItem({ itemType: "potion", value: this.value, x: 0, y: 0 });
        } else if (this.itemType === "key") {
          const result = dungeon.player.addToInventory({ itemType: "key", value: 1, x: 0, y: 0 });
          if (result) {
            dungeon.particles.spawnFloatingText("Key!", this.x + CONFIG.TILE_SIZE / 2, this.y - 10, 255, 213, 79);
            dungeon.audio.playSFX("pickupKey");
          } else {
            // Inventory full, item remains
            this.collected = false;
          }
        } else if (this.itemType === "weapon") {
          const result = dungeon.player.addToInventory({ itemType: "weapon", value: this.value, x: 0, y: 0 });
          if (result) {
            dungeon.particles.spawnFloatingText(`Found ${this.value.name}!`, this.x + CONFIG.TILE_SIZE / 2, this.y - 10, 176, 190, 197);
            dungeon.audio.playSFX("pickupKey");
          } else {
            this.collected = false;
          }
        }

        if (this.itemType === "potion" || !this.collected) {
          // Potion always collected since it's auto-used by pickupItem
        }

        this.active = false;
      }
    }
  }

  render(renderer) {
    if (!this.active) return;
    const ctx = renderer.ctx;
    const cx = this.getCenterX();
    const bobY = Math.sin(this.bobPhase) * 4;
    const cy = this.getCenterY() + bobY;

    // Pulsing glow outline
    const pulseAlpha = Math.sin(this.bobPhase) * 0.15 + 0.25;
    renderer.drawGlow(cx, cy, 14, `rgba(${this.hexToRgb(this.color)},${pulseAlpha})`);

    switch (this.itemType) {
      case "potion": {
        // Potion bottle shape
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.moveTo(cx - 4, cy + 6);
        ctx.lineTo(cx - 5, cy - 2);
