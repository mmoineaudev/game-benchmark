<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VOID DRIFT</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #111827; }
  body { font-family: 'Courier New', monospace; color: #aaccff; }
  #game-container { position: fixed; inset: 0; }
  #game-container canvas { display: block; }

  /* ---------- HUD ---------- */
  .hud { position: fixed; pointer-events: none; z-index: 10; }
  .hud-panel {
    background: rgba(4, 14, 28, 0.55);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    border: 1px solid rgba(122, 223, 255, 0.25);
    border-radius: 10px;
    padding: 8px 16px;
    text-shadow: 0 0 12px rgba(100, 150, 255, 0.8);
  }
  #hud-score { top: 18px; left: 18px; font-size: 18px; letter-spacing: 2px; }
  #hud-score .label, #hud-distance .label { font-size: 10px; opacity: 0.7; display: block; letter-spacing: 3px; }
  #hud-distance { top: 18px; right: 18px; font-size: 18px; letter-spacing: 2px; text-align: right; }
  #hud-high { top: 18px; left: 50%; transform: translateX(-50%); font-size: 12px; letter-spacing: 2px; opacity: 0.85; }

  #hud-health {
    bottom: 26px; left: 50%; transform: translateX(-50%);
    width: 320px; text-align: center; padding: 10px 16px 14px;
  }
  #hud-health .label { font-size: 10px; letter-spacing: 4px; opacity: 0.8; margin-bottom: 6px; display: block; }
  #health-bar-outer {
    width: 100%; height: 12px; border-radius: 6px;
    background: rgba(0,0,0,0.5); border: 1px solid rgba(122,223,255,0.3); overflow: hidden;
  }
  #health-fill {
    height: 100%; width: 100%; border-radius: 6px;
    background: linear-gradient(90deg, #22cc66, #55ffaa);
    box-shadow: 0 0 12px rgba(85,255,170,0.7);
    transition: width 0.15s ease-out;
  }

  /* ---------- Overlays ---------- */
  .overlay {
    position: fixed; inset: 0; z-index: 20;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, rgba(10,16,32,0.82) 0%, rgba(4,8,18,0.95) 100%);
    text-align: center;
  }
  .overlay.hidden { display: none; }
  .overlay h1 {
    font-size: 56px; letter-spacing: 14px; color: #7adfff;
    text-shadow: 0 0 24px rgba(122,223,255,0.9), 0 0 64px rgba(122,223,255,0.4);
    margin-bottom: 10px; font-weight: normal;
  }
  .overlay h2 { font-size: 14px; letter-spacing: 6px; opacity: 0.7; margin-bottom: 40px; font-weight: normal; }
  .overlay .controls-legend {
    font-size: 12px; line-height: 1.9; letter-spacing: 1px; opacity: 0.85;
    background: rgba(4,14,28,0.55); border: 1px solid rgba(122,223,255,0.2);
    border-radius: 10px; padding: 16px 28px; margin-bottom: 32px; text-align: left;
  }
  .overlay .controls-legend b { color: #7adfff; display: inline-block; min-width: 170px; font-weight: normal; }
  .overlay .prompt {
    font-size: 16px; letter-spacing: 4px; color: #aaccff;
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 0.45; } 50% { opacity: 1; } }

  #game-over h1 { color: #ff6666; text-shadow: 0 0 24px rgba(255,68,68,0.9), 0 0 64px rgba(255,68,68,0.4); }
  #game-over .stats { font-size: 16px; line-height: 2.1; letter-spacing: 2px; margin-bottom: 34px; }
  #game-over .stats span { color: #7adfff; }
  #game-over .new-high { color: #ffee66; text-shadow: 0 0 16px rgba(255,238,102,0.9); letter-spacing: 4px; margin-bottom: 20px; font-size: 14px; }

  /* ---------- FX overlays ---------- */
  #damage-flash {
    position: fixed; inset: 0; z-index: 15; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 30%, rgba(255,68,68,0.45) 100%);
    opacity: 0; transition: opacity 0.08s;
  }
  #warning-overlay {
    position: fixed; inset: 0; z-index: 14; pointer-events: none;
    box-shadow: inset 0 0 120px rgba(255,40,40,0.55);
    opacity: 0;
  }
  #warning-overlay.active { animation: warningPulse 1.1s ease-in-out infinite; }
  @keyframes warningPulse { 0%,100% { opacity: 0.25; } 50% { opacity: 0.85; } }

  /* ---------- Crosshair ---------- */
  #crosshair {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    z-index: 10; pointer-events: none; width: 24px; height: 24px;
  }
  #crosshair::before, #crosshair::after {
    content: ''; position: absolute; background: rgba(122,223,255,0.9);
    box-shadow: 0 0 6px rgba(122,223,255,0.9);
  }
  #crosshair::before { left: 50%; top: 0; width: 2px; height: 100%; transform: translateX(-50%); clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%, 0 65%, 100% 65%, 100% 100%, 0 100%); }
  #crosshair::after { top: 50%; left: 0; height: 2px; width: 100%; transform: translateY(-50%); clip-path: polygon(0 0, 35% 0, 35% 100%, 0 100%, 65% 0, 100% 0, 100% 100%, 65% 100%); }

  /* ---------- Pickup float text ---------- */
  .pickup-float {
    position: fixed; z-index: 12; pointer-events: none;
    color: #55ffaa; font-size: 18px; letter-spacing: 2px;
    text-shadow: 0 0 10px rgba(85,255,170,0.9);
    animation: floatUp 1.2s ease-out forwards;
  }
  @keyframes floatUp {
    0% { opacity: 1; transform: translate(-50%,-50%); }
    100% { opacity: 0; transform: translate(-50%,-160%); }
  }

  /* ---------- Toast ---------- */
  #toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    z-index: 25; font-size: 12px; letter-spacing: 3px; color: #7adfff;
    background: rgba(4,14,28,0.7); border: 1px solid rgba(122,223,255,0.3);
    border-radius: 8px; padding: 8px 20px; opacity: 0; transition: opacity 0.4s; pointer-events: none;
  }
  #toast.show { opacity: 1; }

  #pointer-hint {
    position: fixed; top: 62%; left: 50%; transform: translateX(-50%);
    z-index: 11; font-size: 12px; letter-spacing: 3px; opacity: 0.6; pointer-events: none;
    display: none;
  }
</style>
  <script type="module" crossorigin src="/assets/index-DotmZksd.js"></script>
</head>
<body>
  <div id="game-container"></div>

  <!-- HUD -->
  <div id="hud-score" class="hud hud-panel"><span class="label">SCORE</span><span id="score-display">0</span></div>
  <div id="hud-distance" class="hud hud-panel"><span class="label">DISTANCE</span><span id="distance-display">0</span></div>
  <div id="hud-high" class="hud hud-panel">BEST&nbsp;<span id="high-display">0</span></div>
  <div id="hud-health" class="hud hud-panel">
    <span class="label">HULL INTEGRITY</span>
    <div id="health-bar-outer"><div id="health-fill"></div></div>
  </div>

  <div id="crosshair"></div>
  <div id="damage-flash"></div>
  <div id="warning-overlay"></div>
  <div id="pointer-hint">CLICK TO CAPTURE MOUSE</div>
  <div id="toast"></div>

  <!-- Pause / Launch -->
  <div id="pause-screen" class="overlay">
    <h1>VOID DRIFT</h1>
    <h2>PROCEDURAL DEEP-SPACE CRUISE</h2>
    <div class="controls-legend" id="controls-legend"><!-- generated --></div>
    <div class="prompt">PRESS SPACE OR CLICK TO LAUNCH</div>
  </div>

  <!-- Game Over -->
  <div id="game-over" class="overlay hidden">
    <h1>SHIP LOST</h1>
    <div class="new-high" id="new-high" style="display:none">★ NEW HIGH SCORE ★</div>
    <div class="stats">
      SCORE&nbsp;&nbsp;<span id="final-score">0</span><br/>
      DISTANCE&nbsp;&nbsp;<span id="final-distance">0</span><br/>
      BEST&nbsp;&nbsp;<span id="final-high">0</span>
    </div>
    <div class="prompt">PRESS R TO FLY AGAIN</div>
  </div>

</body>
</html>
