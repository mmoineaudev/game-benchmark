<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Space Exploration</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overflow: hidden; width: 100%; height: 100%; background: #000; }
    #game-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
    
    /* HUD overlay */
    #hud {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 10;
      font-family: 'Courier New', monospace;
      color: #aaccff;
      text-shadow: 0 0 8px rgba(100,150,255,0.6);
    }
    #score-display {
      position: absolute; top: 16px; left: 20px;
      font-size: 18px; font-weight: bold;
      letter-spacing: 1px;
    }
    #distance-display {
      position: absolute; top: 16px; left: 50%;
      transform: translateX(-50%);
      font-size: 18px; font-weight: bold;
      letter-spacing: 1px;
    }
    #health-container {
      position: absolute; bottom: 20px; left: 50%;
      transform: translateX(-50%);
      width: 260px; height: 14px;
      border: 1px solid rgba(150,200,255,0.4);
      border-radius: 7px; overflow: hidden;
      background: rgba(0,0,0,0.5);
    }
    #health-bar {
      height: 100%; width: 100%;
      background: linear-gradient(90deg, #22cc66, #44ee88);
      transition: width 0.3s ease, background 0.3s ease;
      border-radius: 6px;
    }
    #health-label {
      position: absolute; bottom: 38px; left: 50%;
      transform: translateX(-50%);
      font-size: 11px; opacity: 0.7;
      letter-spacing: 2px;
    }
    
    /* Crosshair */
    #crosshair {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 28px; height: 28px;
    }
    #crosshair::before, #crosshair::after {
      content: ''; position: absolute;
      background: rgba(180,210,255,0.6);
    }
    #crosshair::before {
      top: 50%; left: 2px; right: 2px; height: 1px;
      transform: translateY(-50%);
    }
    #crosshair::after {
      left: 50%; top: 2px; bottom: 2px; width: 1px;
      transform: translateX(-50%);
    }
    .crosshair-dot {
      position: absolute; width: 4px; height: 4px;
      border-radius: 50%;
      background: rgba(180,210,255,0.7);
    }
    .crosshair-dot.tl { top: 1px; left: 1px; }
    .crosshair-dot.tr { top: 1px; right: 1px; }
    .crosshair-dot.bl { bottom: 1px; left: 1px; }
    .crosshair-dot.br { bottom: 1px; right: 1px; }
    
    /* Game Over screen */
    #game-over {
      display: none;
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      z-index: 100;
      flex-direction: column;
      align-items: center; justify-content: center;
      color: #aaccff;
      font-family: 'Courier New', monospace;
      text-shadow: 0 0 12px rgba(100,150,255,0.8);
    }
    #game-over.active { display: flex; }
    #game-over h1 { font-size: 48px; margin-bottom: 20px; letter-spacing: 4px; }
    #game-over .stat { font-size: 20px; margin: 6px 0; }
    #game-over .restart { margin-top: 30px; font-size: 16px; opacity: 0.7; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
    
    /* Warning overlay when health is low */
    #warning-overlay {
      display: none;
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 5; pointer-events: none;
      border: 0px solid rgba(255,0,0,0);
      box-shadow: inset 0 0 80px rgba(255,0,0,0);
      transition: box-shadow 0.2s, border 0.2s;
    }
    #warning-overlay.active {
      display: block;
      animation: warningPulse 1s infinite;
    }
    @keyframes warningPulse {
      0%,100% { box-shadow: inset 0 0 40px rgba(255,0,0,0.1); border: 0px solid rgba(255,0,0,0); }
      50% { box-shadow: inset 0 0 80px rgba(255,0,0,0.25); border: 8px solid rgba(255,0,0,0.15); }
    }
  </style>
  <script type="module" crossorigin src="/assets/index-CYZw_K-6.js"></script>
</head>
<body>
  <div id="game-container"></div>
  
  <div id="hud">
    <div id="score-display">SCORE: 0</div>
    <div id="distance-display">DISTANCE: 0 units</div>
    <div id="health-label">HULL INTEGRITY</div>
    <div id="health-container">
      <div id="health-bar"></div>
    </div>
    <div id="crosshair">
      <div class="crosshair-dot tl"></div>
      <div class="crosshair-dot tr"></div>
      <div class="crosshair-dot bl"></div>
      <div class="crosshair-dot br"></div>
    </div>
  </div>
  
  <div id="warning-overlay"></div>
  
  <div id="game-over">
    <h1>GAME OVER</h1>
    <div class="stat" id="go-score">Score: 0</div>
    <div class="stat" id="go-distance">Distance: 0 units</div>
    <div class="stat" id="go-highscore">High Score: 0</div>
    <div class="restart">Press R to restart</div>
  </div>
  
</body>
</html>
