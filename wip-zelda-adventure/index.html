        ctx.quadraticCurveTo(cx - 4, cy - 6, cx, cy - 7);
        ctx.quadraticCurveTo(cx + 4, cy - 6, cx + 5, cy - 2);
        ctx.lineTo(cx + 4, cy + 6);
        ctx.closePath();
        ctx.fill();

        // Bottle neck
        ctx.fillStyle = "#558b2f";
        ctx.fillRect(cx - 2, cy - 10, 4, 4);

        // Cork
        ctx.fillStyle = "#8d6e63";
        ctx.fillRect(cx - 2, cy - 11, 4, 2);

        // Highlight shine
        ctx.fillStyle = "rgba(255,255,255,0.4)";
        ctx.beginPath();
        ctx.arc(cx - 1, cy - 2, 2, 0, Math.PI * 2);
        ctx.fill();
        break;
      }
      case "key": {
        // Key silhouette
        ctx.fillStyle = this.color;
        // Head (round)
        ctx.beginPath();
        ctx.arc(cx - 4, cy, 4, 0, Math.PI * 2);
        ctx.fill();
        // Hole in head
        ctx.fillStyle = "#1a1a1a";
        ctx.beginPath();
        ctx.arc(cx - 4, cy, 1.5, 0, Math.PI * 2);
        ctx.fill();
        // Shaft
        ctx.fillStyle = this.color;
        ctx.fillRect(cx - 1, cy - 1, 10, 3);
        // Teeth
        ctx.fillRect(cx + 7, cy + 2, 2, 4);
        ctx.fillRect(cx + 5, cy + 2, 2, 3);
        break;
      }
      case "weapon": {
        // Sword outline
        ctx.fillStyle = this.color;
        const dir = Math.atan2(dungeon.player.getCenterY() - cy, dungeon.player.getCenterX() - cx) || 0;
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(dir);

        // Blade
        ctx.beginPath();
        ctx.moveTo(8, -1.5);
        ctx.lineTo(2, -2.5);
        ctx.lineTo(-6, -2);
        ctx.lineTo(-6, 2);
        ctx.lineTo(2, 2.5);
        ctx.closePath();
        ctx.fill();

        // Guard
        ctx.fillStyle = "#b0bec5";
        ctx.fillRect(-8, -3, 3, 6);

        // Handle
        ctx.fillStyle = "#5d4037";
        ctx.fillRect(-12, -1.5, 4, 3);

        ctx.restore();
        break;
      }
    }
  }

  hexToRgb(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return `${r},${g},${b}`;
  }
}

// ================================================================
// DUNGEON / MAP CLASS - Procedural room generation and tile storage
// ================================================================
class Dungeon {
  constructor(input, audio, particles) {
    this.input = input;
    this.audio = audio;
    this.particles = particles;
    this.tileGrid = [];
    this.rooms = [];
    this.currentRoom = null;
    this.player = null;
    this.projectiles = [];
    this.items = [];

    // Door system: track locked doors by position
    this.lockedDoors = new Map(); // "x,y" -> true/false

    // Explored rooms for minimap
    this.exploredRooms = new Set();
  }

  generate(seed, depth) {
    const rng = mulberry32(seed);
    this.seed = seed;

    // Initialize empty tile grid (walls everywhere initially)
    this.tileGrid = [];
    for (let y = 0; y < CONFIG.MAP_TILES_Y; y++) {
      this.tileGrid[y] = [];
      for (let x = 0; x < CONFIG.MAP_TILES_X; x++) {
        this.tileGrid[y][x] = TILES.WALL;
      }
    }

    this.rooms = [];
    const numRooms = Math.floor(rng() * (CONFIG.maxRooms - CONFIG.minRooms + 1)) + CONFIG.minRooms;

    // Try to place rooms without overlap
    let attempts = 0;
    while (this.rooms.length < numRooms && attempts < 500) {
      const w = Math.floor(rng() * (CONFIG.maxRoomSize - CONFIG.minRoomSize + 1)) + CONFIG.minRoomSize;
      const h = Math.floor(rng() * (CONFIG.maxRoomSize - CONFIG.minRoomSize + 1)) + CONFIG.minRoomSize;
      const x = Math.floor(rng() * (CONFIG.MAP_TILES_X - w - 4)) + 2;
      const y = Math.floor(rng() * (CONFIG.MAP_TILES_Y - h - 4)) + 2;

      // Check no overlap with existing rooms
      let overlaps = false;
      for (const room of this.rooms) {
        if (x < room.x + room.w + 2 && x + w + 2 > room.x &&
            y < room.y + room.h + 2 && y + h + 2 > room.y) {
          overlaps = true;
          break;
        }
      }

      if (!overlaps) {
        this.rooms.push({ x, y, w, h, doors: [], enemies: [], isSpawn: false, isBoss: false });
      }
      attempts++;
    }

    if (this.rooms.length < 2) {
      // Fallback: place rooms in a line
      for (let i = 0; i < numRooms; i++) {
        const w = 6 + Math.floor(rng() * 4);
        const h = 5 + Math.floor(rng() * 3);
        const x = 2 + i * (w + 4);
        this.rooms.push({ x, y: Math.floor(CONFIG.MAP_TILES_Y / 2 - h / 2), w, h, doors: [], enemies: [], isSpawn: false, isBoss: false });
      }
    }

    // Carve rooms into tile grid
    for (const room of this.rooms) {
      for (let y = room.y; y < room.y + room.h; y++) {
        for (let x = room.x; x < room.x + room.w; x++) {
          this.tileGrid[y][x] = TILES.FLOOR;
        }
      }
    }

    // Connect rooms with L-shaped corridors using BFS
    this.connectRooms(rng);

    // Mark first room as spawn, last (furthest) as boss room
    const spawnRoom = this.rooms[0];
    spawnRoom.isSpawn = true;

    // Find furthest room from spawn using simple distance heuristic
    let maxDist = 0;
    let bossIdx = 1;
    for (let i = 1; i < this.rooms.length; i++) {
      const dx = this.rooms[i].x - spawnRoom.x;
      const dy = this.rooms[i].y - spawnRoom.y;
      const dist = Math.abs(dx) + Math.abs(dy);
      if (dist > maxDist) { maxDist = dist; bossIdx = i; }
    }
    this.rooms[bossIdx].isBoss = true;

    // Add exit tile to boss room
    const bossRoom = this.rooms.find(r => r.isBoss);
    if (bossRoom) {
      bossRoom.hasExit = true;
      const ex = bossRoom.x + Math.floor(bossRoom.w / 2);
      const ey = bossRoom.y + bossRoom.h - 1;
      if (ex < CONFIG.MAP_TILES_X && ey < CONFIG.MAP_TILES_Y) {
        this.tileGrid[ey][ex] = TILES.EXIT;
      }
    }

    // Place doors at room corridors and add hazard tiles
    this.addDoorsAndHazards(rng, depth);

    // Spawn enemies in rooms
    const depthMultHP = Math.pow(CONFIG.DEPTH_HP_SCALING, depth);
    const depthMultDmg = Math.pow(CONFIG.DEPTH_DMG_SCALING, depth);
    this.spawnEnemies(depthMultHP, depthMultDmg, rng);

    // Place player in spawn room
    if (spawnRoom) {
      this.player = new Player(
        (spawnRoom.x + Math.floor(spawnRoom.w / 2)) * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2 - CONFIG.TILE_SIZE * 0.4,
        (spawnRoom.y + Math.floor(spawnRoom.h / 2)) * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2 - CONFIG.TILE_SIZE * 0.4
      );
    }

    this.currentRoom = spawnRoom;
    if (spawnRoom) {
      this.exploredRooms.add(`room_${this.rooms.indexOf(spawnRoom)}`);
    }

    return { player: this.player, currentRoom: this.currentRoom };
  }

  connectRooms(rng) {
    // BFS to ensure full connectivity, connecting rooms sequentially
    for (let i = 1; i < this.rooms.length; i++) {
      const from = this.rooms[i - 1];
      const to = this.rooms[i];

      // Start at center of from room
      let x = from.x + Math.floor(from.w / 2);
      let y = from.y + Math.floor(from.h / 2);

      // Target: near edge of to room (closer side)
      const tx = to.x + Math.floor(to.w / 2);
      const ty = to.y + Math.floor(to.h / 2);

      // L-shaped corridor: horizontal then vertical, or vice versa
      const goHorizontalFirst = rng() > 0.5;

      if (goHorizontalFirst) {
        this.carveHCorridor(x, tx, y);
        x = tx;
        this.carveVCorridor(y, ty, x);
      } else {
        this.carveVCorridor(y, ty, x);
        y = ty;
        this.carveHCorridor(x, tx, y);
      }

      // Track corridor-room transitions for room detection
    }

    // Build door data on rooms based on corridor positions
    this.buildRoomConnections();
  }

  carveHCorridor(x1, x2, y) {
    const startX = Math.min(x1, x2);
    const endX = Math.max(x1, x2);
    for (let x = startX; x <= endX; x++) {
      if (y >= 0 && y < CONFIG.MAP_TILES_Y && x >= 0 && x < CONFIG.MAP_TILES_X) {
        this.tileGrid[y][x] = TILES.CORRIDOR_FLOOR;
        // Carve ceiling above corridor for width
        if (y > 0 && this.tileGrid[y - 1][x] === TILES.WALL) {
          this.tileGrid[y - 1][x] = TILES.WALL; // keep walls
        }
      }
    }
  }

  carveVCorridor(y1, y2, x) {
    const startY = Math.min(y1, y2);
    const endY = Math.max(y1, y2);
    for (let y = startY; y <= endY; y++) {
      if (x >= 0 && x < CONFIG.MAP_TILES_X && y >= 0 && y < CONFIG.MAP_TILES_Y) {
        this.tileGrid[y][x] = TILES.CORRIDOR_FLOOR;
      }
    }
  }

  buildRoomConnections() {
    // For each room, determine which corridors connect to adjacent rooms
    for (const room of this.rooms) {
      // Find corridor tiles that are on the edges of the room
      const doorPositions = [];

      // Check each edge of the room for corridor connections
      // Top edge
      for (let x = room.x; x < room.x + room.w; x++) {
        if (room.y > 0 && this.tileGrid[room.y - 1][x] === TILES.CORRIDOR_FLOOR && this.tileGrid[room.y][x] === TILES.FLOOR) {
          doorPositions.push({ x, y: room.y - 1, dx: 0, dy: -1 });
        }
      }

      // Bottom edge
      for (let x = room.x; x < room.x + room.w; x++) {
        const by = room.y + room.h;
        if (by < CONFIG.MAP_TILES_Y && this.tileGrid[by][x] === TILES.CORRIDOR_FLOOR && this.tileGrid[room.y + room.h - 1][x] === TILES.FLOOR) {
          doorPositions.push({ x, y: by, dx: 0, dy: 1 });
        }
      }

      // Left edge
      for (let y = room.y; y < room.y + room.h; y++) {
        if (room.x > 0 && this.tileGrid[y][room.x - 1] === TILES.CORRIDOR_FLOOR && this.tileGrid[y][room.x] === TILES.FLOOR) {
          doorPositions.push({ x: room.x - 1, y, dx: -1, dy: 0 });
        }
      }

      // Right edge
      for (let y = room.y; y < room.y + room.h; y++) {
        const rx = room.x + room.w;
        if (rx < CONFIG.MAP_TILES_X && this.tileGrid[y][rx] === TILES.CORRIDOR_FLOOR && this.tileGrid[y][room.x + room.w - 1] === TILES.FLOOR) {
          doorPositions.push({ x: rx, y, dx: 1, dy: 0 });
        }
      }

      room.doors = doorPositions;
    }

    // Place door tiles at corridor-room transitions
    for (const room of this.rooms) {
      for (let i = 0; i < room.doors.length; i++) {
        const door = room.doors[i];
        if (!this.isDoorAlreadyPlaced(door.x, door.y)) {
          // Some doors are locked (randomly), except the first few rooms
          const shouldLock = room !== this.rooms[0] && Math.random() < 0.4;
          if (shouldLock) {
            this.tileGrid[door.y][door.x] = TILES.DOOR_LOCKED;
            this.lockedDoors.set(`${door.x},${door.y}`, true);
          } else {
            this.tileGrid[door.y][door.x] = TILES.DOOR_UNLOCKED;
          }
        }
      }
    }
  }

  isDoorAlreadyPlaced(x, y) {
    const tile = this.getTile(x, y);
    return tile === TILES.DOOR_LOCKED || tile === TILES.DOOR_UNLOCKED;
  }

  addDoorsAndHazards(rng, depth) {
    // Place hazard tiles in corridors (not in rooms)
    let hazardCount = 0;
    for (let y = 2; y < CONFIG.MAP_TILES_Y - 2; y++) {
      for (let x = 2; x < CONFIG.MAP_TILES_X - 2; x++) {
        if (this.tileGrid[y][x] === TILES.CORRIDOR_FLOOR && hazardCount < 10) {
          // Don't place hazards on doors or near spawn room
          let inSpawnRoom = false;
          const spawnRoom = this.rooms[0];
          if (spawnRoom && x >= spawnRoom.x && x < spawnRoom.x + spawnRoom.w && y >= spawnRoom.y && y < spawnRoom.y + spawnRoom.h) {
            inSpawnRoom = true;
          }
          if (!inSpawnRoom && rng() < 0.15) {
            this.tileGrid[y][x] = TILES.HAZARD;
            hazardCount++;
          }
        }
      }
    }
  }

  spawnEnemies(depthHPMult, depthDmgMult, rng) {
    for (let i = 0; i < this.rooms.length; i++) {
      const room = this.rooms[i];

      if (room.isSpawn) continue; // No enemies in spawn room

      if (room.isBoss) {
        // Boss room: always exactly one Mini-Boss, maybe minions
        const bossX = (room.x + Math.floor(room.w / 2)) * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2 - CONFIG.TILE_SIZE * 0.75;
        const bossY = (room.y + Math.floor(room.h / 2)) * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2 - CONFIG.TILE_SIZE * 0.75;
        room.enemies.push(new MiniBoss(bossX, bossY, depthHPMult));

        // Optional minions in boss room for deeper levels
        if (depthHPMult > 1.2) {
          const numMinions = Math.min(2, Math.floor(rng()));
          for (let m = 0; m < numMinions; m++) {
            const mx = (room.x + 1 + rng() * (room.w - 2)) * CONFIG.TILE_SIZE;
            const my = (room.y + 1 + rng() * (room.h - 2)) * CONFIG.TILE_SIZE;
            room.enemies.push(new Slime(mx, my, depthHPMult));
          }
        }
      } else {
        // Non-boss rooms: mix of slimes and skeleton archers
        const numEnemies = Math.min(4, 1 + Math.floor(rng() * (2 + i / 3)));

        for (let e = 0; e < numEnemies; e++) {
          const ex = (room.x + 1 + rng() * (room.w - 2)) * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
          const ey = (room.y + 1 + rng() * (room.h - 2)) * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;

          // Prefer skeleton archers in later rooms
          if (rng() < Math.min(0.6, 0.2 + i * 0.1) && room.w > 6) {
            room.enemies.push(new SkeletonArcher(ex, ey, depthHPMult));
          } else {
            room.enemies.push(new Slime(ex, ey, depthHPMult));
          }
        }
      }

      // Assign this room reference to each enemy for AI context
      for (const enemy of room.enemies) {
        enemy.room = room;
      }
    }
  }

  getTile(x, y) {
    if (x < 0 || x >= CONFIG.MAP_TILES_X || y < 0 || y >= CONFIG.MAP_TILES_Y) return TILES.WALL;
    return this.tileGrid[y][x];
  }

  setTile(x, y, type) {
    if (x >= 0 && x < CONFIG.MAP_TILES_X && y >= 0 && y < CONFIG.MAP_TILES_Y) {
      this.tileGrid[y][x] = type;
    }
  }

  getRoomAt(tx, ty) {
    for (const room of this.rooms) {
      if (tx >= room.x && tx < room.x + room.w && ty >= room.y && ty < room.y + room.h) {
        return room;
      }
    }
    return null;
  }

  getCurrentRoom() {
    return this.currentRoom;
  }

  /** Transition to a new room with fade effect */
  transitionToRoom(room, px, py) {
    if (this._transitioning) return;
    this._transitionAlpha = 0;
    this._transitionTarget = "out"; // out -> load -> in
    this._targetRoom = room;
    this._targetPlayerX = px;
    this._targetPlayerY = py;
    this._currentRoom = this.currentRoom;
  }

  updateTransition(dt) {
    if (!this._transitioning) return;

    switch (this._transitionTarget) {
      case "out": {
        this._transitionAlpha += dt / CONFIG.TRANSITION_DURATION;
        if (this._transitionAlpha >= 1) {
          // Load new room content
          this.currentRoom = this._targetRoom;
          this.exploredRooms.add(`room_${this.rooms.indexOf(this._targetRoom)}`);

          // Update enemy references to current room for culling
          for (const room of this.rooms) {
            for (const enemy of room.enemies) {
              enemy.room = this.currentRoom;
            }
          }

          this.player.x = this._targetPlayerX;
          this.player.y = this._targetPlayerY;

          // Clear projectiles and items from previous room
          this.projectiles = [];

          this._transitionAlpha = 0;
          this._transitionTarget = "in";
        }
        break;
      }
      case "in": {
        this._transitionAlpha += dt / CONFIG.TRANSITION_DURATION;
        if (this._transitionAlpha >= 1) {
          this._transitioning = false;
          this._transitionAlpha = 0;
        }
        break;
      }
    }
  }

  getTransitionAlpha() {
    if (!this._transitioning) return 0;
    if (this._transitionTarget === "out") return this._transitionAlpha;
    return 1 - this._transitionAlpha;
  }

  /** Check room transitions when player stands on a door tile */
  checkRoomTransition() {
    const cx = Math.floor((this.player.x + this.player.width / 2) / CONFIG.TILE_SIZE);
    const cy = Math.floor((this.player.y + this.player.height / 2) / CONFIG.TILE_SIZE);

    // Check all 4 directions for doors between rooms
    const dirs = [
      { dx: -1, dy: 0 }, { dx: 1, dy: 0 }, { dx: 0, dy: -1 }, { dx: 0, dy: 1 }
    ];

    for (const d of dirs) {
      const nx = cx + d.dx;
      const ny = cy + d.dy;
      const tile = this.getTile(nx, ny);

      if (tile === TILES.DOOR_UNLOCKED) {
        const targetRoom = this.getRoomAt(nx, ny);
        if (targetRoom && targetRoom !== this.currentRoom) {
          // Find the corresponding door in target room
          const targetDoor = targetRoom.doors.find(td => td.dx === -d.dx && td.dy === -d.dy);
          let doorX, doorY;
          if (targetDoor) {
            doorX = (targetDoor.x + d.dx) * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2 - this.player.width / 2;
            doorY = (targetDoor.y + d.dy) * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2 - this.player.height / 2;
          } else {
            doorX = (targetRoom.x + Math.floor(targetRoom.w / 2)) * CONFIG.TILE_SIZE;
            doorY = (targetRoom.y + Math.floor(targetRoom.h / 2)) * CONFIG.TILE_SIZE;
          }
          this.transitionToRoom(targetRoom, doorX, doorY);
          return;
        }
      } else if (tile === TILES.DOOR_LOCKED) {
        // Try to use key from inventory
        if (this.player.hasKey()) {
          this.player.consumeKey();
          this.setTile(nx, ny, TILES.DOOR_UNLOCKED);
          this.audio.playSFX("unlockDoor");
          return;
        }
      }
    }
  }

  /** Trigger victory screen */
  triggerVictory() {
    this._victoryTriggered = true;
  }

  getAllEnemies() {
    const enemies = [];
    for (const room of this.rooms) {
      for (const enemy of room.enemies) {
        enemies.push(enemy);
      }
    }
    return enemies;
  }

  removeDeadEntities() {
    // Remove dead enemies from rooms and spawn items
    for (const room of this.rooms) {
      const newEnemies = [];
      for (const enemy of room.enemies) {
        if (enemy.state === ENEMY_STATES.DEATH && enemy.deathAnimTimer <= 0) {
          // Drop loot
          const drops = enemy.dropLoot();
          for (const drop of drops) {
            const item = new GroundItem(
              enemy.x + enemy.width / 2,
              enemy.y + enemy.height / 2,
              drop.itemType,
              drop.value
            );
            this.items.push(item);
          }

          // Spawn death particles
          if (enemy.typeName === "slime") {
            this.particles.spawnExplosion(enemy.getCenterX(), enemy.getCenterY(), 15, 76, 175, 80, 100, 0.5);
          } else if (enemy.typeName === "skeleton") {
            this.particles.spawnExplosion(enemy.getCenterX(), enemy.getCenterY(), 20, 238, 238, 238, 120, 0.6);
          } else if (enemy.typeName === "miniboss") {
            this.particles.spawnExplosion(enemy.getCenterX(), enemy.getCenterY(), 50, 183, 28, 79, 150, 1.0);
            // Floating text for XP
            const xpGain = Math.round(50 * (this.rooms.indexOf(room) / this.rooms.length + 1));
            this.player.gainXP(xpGain);
            this.particles.spawnFloatingText(`+${xpGain} XP`, enemy.getCenterX(), enemy.getCenterY() - 20, 253, 216, 53, 18);
            // Screen shake for boss death
            if (!this._screenShake) this.screenShake(12);
          }

          this.player.enemiesDefeated++;
        } else if (enemy.active && !enemy.dead) {
          newEnemies.push(enemy);
        }
      }
      room.enemies = newEnemies;
    }

    // Remove dead items
    this.items = this.items.filter(i => i.active);

    // Clean up dead projectiles
    this.projectiles = this.projectiles.filter(p => p.active);
  }

  handleCombat(dt) {
    if (this.player.dead || this.player.isAttacking) {
      const hitbox = this.player.getAttackHitbox();

      for (const room of this.rooms) {
        for (const enemy of room.enemies) {
          if (!enemy.active || enemy.dead || enemy.state === ENEMY_STATES.DEATH) continue;

          // Check attack hitbox against enemy
          const enemyLeft = enemy.x, enemyRight = enemy.x + enemy.width;
          const enemyTop = enemy.y, enemyBottom = enemy.y + enemy.height;

          if (hitbox.x < enemyRight && hitbox.x + hitbox.w > enemyLeft &&
              hitbox.y < enemyBottom && hitbox.y + hitbox.h > enemyTop) {
            // Hit! Apply damage
            const totalDmg = this.player.attack + this.player.currentWeapon.attackBonus;
            const actualDmg = Math.max(1, totalDmg);
            enemy.takeDamage(actualDmg);

            // Visual feedback
            this.particles.spawnFloatingText(`-${actualDmg}`, enemy.getCenterX(), enemy.y - 10, 229, 57, 53);

            if (enemy.typeName === "miniboss") {
              this.screenShake(4);
              this._hitStop = CONFIG.HIT_STOP_FRAMES_BOSS;
              this.audio.playSFX("hitImpact", { freq: 80, vol: 0.5 });
            } else {
              this.screenShake(2);
              this._hitStop = CONFIG.HIT_STOP_FRAMES_NORMAL;
              this.audio.playSFX("hitImpact");
            }

            // Sparks at impact point
            const impactX = (hitbox.x + hitbox.w / 2 + enemy.getCenterX()) / 2;
            const impactY = (hitbox.y + hitbox.h / 2 + enemy.getCenterY()) / 2;
            this.particles.spawnExplosion(impactX, impactY, 6, 255, 193, 7, 80, 0.3);

            if (enemy.dead || enemy.state === ENEMY_STATES.DEATH) {
              // Death handled in removeDeadEntities
              this.audio.playSFX("enemyDeath");
            }
          }
        }
      }
    }
  }

  screenShake(intensity) {
    if (!this._screenShake) this._screenShake = 0;
    this._screenShake = Math.max(this._screenShake, intensity);
  }

  /** Handle inventory slot keys (1-8) */
  handleInventory(input) {
    for (let i = 1; i <= 8; i++) {
      if (input.wasPressed(`Digit${i}`)) {
        this.player.useItem(i - 1);
      }
    }
  }

  render(renderer, cam) {
    const ctx = renderer.ctx;
    const ts = CONFIG.TILE_SIZE;

    // Culling: determine visible tile range based on camera
    const viewX = Math.max(0, Math.floor((cam.x - 100) / ts));
    const viewY = Math.max(0, Math.floor((cam.y - 100) / ts));
    const viewW = Math.min(CONFIG.MAP_TILES_X, Math.ceil((cam.x + cam.w + 100) / ts));
    const viewH = Math.min(CONFIG.MAP_TILES_Y, Math.ceil((cam.y + cam.h + 100) / ts));

    // Draw tiles (floor -> walls -> doors -> hazards -> exit)
    for (let y = viewY; y < viewH; y++) {
      for (let x = viewX; x < viewW; x++) {
        const tile = this.tileGrid[y][x];
        const px = x * ts;
        const py = y * ts;

        switch (tile) {
          case TILES.WALL:
            ctx.fillStyle = "#1a1a1a";
            ctx.fillRect(px, py, ts, ts);
            // Edge highlights for depth
            ctx.fillStyle = "#2a2a2a";
            if (this.tileGrid[y - 1] && this.tileGrid[y - 1][x] !== TILES.WALL) ctx.fillRect(px, py, ts, 2);
            if (this.tileGrid[y + 1] && this.tileGrid[y + 1][x] !== TILES.WALL) ctx.fillRect(px, py + ts - 2, ts, 2);
            if (this.tileGrid[y][x - 1] !== TILES.WALL) ctx.fillRect(px, py, 2, ts);
            if (this.tileGrid[y][x + 1] !== TILES.WALL) ctx.fillRect(px + ts - 2, py, 2, ts);
            break;

          case TILES.FLOOR:
          case TILES.CORRIDOR_FLOOR: {
            ctx.fillStyle = "#2d2d2d";
            ctx.fillRect(px, py, ts, ts);
            // Subtle grid lines
            ctx.strokeStyle = "rgba(45,45,45,0.3)";
            ctx.lineWidth = 0.5;
            ctx.strokeRect(px + 0.5, py + 0.5, ts - 1, ts - 1);
            break;
          }

          case TILES.DOOR_LOCKED: {
            ctx.fillStyle = "#3e2723";
            ctx.fillRect(px, py, ts, ts);
            // Golden lock
            renderer.drawGlow(px + ts / 2, py + ts / 2, 8, "rgba(255,213,79,0.3)");
            ctx.fillStyle = "#ffd54f";
            ctx.fillRect(px + ts / 2 - 4, py + ts / 2 - 5, 8, 10);
            ctx.fillStyle = "#1a1a1a";
            ctx.beginPath();
            ctx.arc(px + ts / 2, py + ts / 2 + 2, 2, 0, Math.PI * 2);
            ctx.fill();
            break;
          }

          case TILES.DOOR_UNLOCKED: {
            ctx.fillStyle = "#2e1f0f";
            ctx.fillRect(px, py, ts, ts);
            // Open archway
            ctx.fillStyle = "#4a3000";
            ctx.beginPath();
            ctx.arc(px + ts / 2, py + ts * 0.3, ts * 0.35, Math.PI, Math.PI * 2);
            ctx.lineTo(px + ts - 1, py + ts - 1);
            ctx.lineTo(px + 1, py + ts - 1);
            ctx.closePath();
            ctx.fill();
            break;
          }

          case TILES.HAZARD: {
            // Pulsing red-orange hazard tile
            const pulse = Math.sin(Date.now() * 0.005) * 0.3 + 0.7;
            ctx.fillStyle = `rgba(230,81,0,${pulse})`;
            ctx.fillRect(px, py, ts, ts);
            // Spike pattern
            ctx.fillStyle = "#bf360c";
            for (let i = 0; i < 4; i++) {
              const sx = px + (i % 2) * (ts / 2) + ts / 4;
              const sy = py + Math.floor(i / 2) * (ts / 2) + ts / 4;
              ctx.beginPath();
              ctx.moveTo(sx, sy - 5);
              ctx.lineTo(sx - 3, sy + 4);
              ctx.lineTo(sx + 3, sy + 4);
              ctx.closePath();
              ctx.fill();
            }
            break;
          }

          case TILES.EXIT: {
            // Portal effect with particle glow
            const portalPulse = Math.sin(Date.now() * 0.008) * 0.2 + 0.5;
            renderer.drawGlow(px + ts / 2, py + ts / 2, 16, `rgba(253,216,53,${portalPulse})`);
            ctx.fillStyle = "#fdd835";
            ctx.fillRect(px + 4, py + 4, ts - 8, ts - 8);
            ctx.fillStyle = "#fff9c4";
            ctx.fillRect(px + 8, py + 8, ts - 16, ts - 16);
            break;
          }
        }
      }
    }
  }

  renderItems(renderer) {
    for (const item of this.items) {
      if (item.active) item.render(renderer);
    }
  }

  renderEnemies(renderer) {
    const currentRoomEnemies = this.currentRoom ? this.currentRoom.enemies : [];
    for (const enemy of currentRoomEnemies) {
      if (enemy.active && !enemy.dead) enemy.render(renderer);
    }
  }

  renderProjectiles(renderer) {
    for (const proj of this.projectiles) {
      if (proj.active) proj.render(renderer);
    }
  }
}

// ================================================================
// CAMERA CLASS - Smooth following with shake and boundaries
// ================================================================
class Camera {
  constructor() {
    this.x = 0;
    this.y = 0;
    this.targetX = 0;
    this.targetY = 0;
    this.shakeIntensity = 0;
    this.w = 800; // will be set from game resize
    this.h = 600;
    this._hitStop = 0;
  }

  update(dt, playerX, playerY, mapW, mapH) {
    // Hit-stop: freeze camera updates briefly
    if (this._hitStop > 0) {
      this._hitStop -= dt;
      return;
    }

    // Lerp toward target position
    const lerpRate = CONFIG.CAMERA_LERP;
    this.targetX = playerX - this.w / 2 + CONFIG.TILE_SIZE * 0.4;
    this.targetY = playerY - this.h / 2 + CONFIG.TILE_SIZE * 0.4;

    this.x += (this.targetX - this.x) * lerpRate;
    this.y += (this.targetY - this.y) * lerpRate;

    // Clamp to map bounds
    const maxMapW = mapW * CONFIG.TILE_SIZE - this.w;
    const maxMapH = mapH * CONFIG.TILE_SIZE - this.h;
    this.x = Math.max(0, Math.min(maxMapW, this.x));
    this.y = Math.max(0, Math.min(maxMapH, this.y));

    // Screen shake decay
    if (this.shakeIntensity > 0.1) {
      this.shakeX = (Math.random() - 0.5) * this.shakeIntensity;
      this.shakeY = (Math.random() - 0.5) * this.shakeIntensity;
      this.shakeIntensity *= CONFIG.SCREEN_SHAKE_DECAY;
    } else {
      this.shakeX = 0;
      this.shakeY = 0;
      this.shakeIntensity = 0;
    }
  }

  apply(renderer) {
    renderer.cameraX = this.x + this.shakeX;
    renderer.cameraY = this.y + this.shakeY;
  }

  triggerShake(intensity) {
    this.shakeIntensity = Math.max(this.shakeIntensity, intensity);
  }

  setHitStop(frames) {
    this._hitStop = frames * CONFIG.FIXED_TIMESTEP;
  }
}

// ================================================================
// HUD RENDERING - Health, XP, inventory, minimap
// ================================================================
class HUD {
  constructor() {
    this.width = CONFIG.HUD_PANEL_WIDTH;
    this.height = CONFIG.HUD_PANEL_HEIGHT;
    this.slotSize = CONFIG.INVENTORY_SLOT_SIZE;
    this.slotCount = 8;
  }

  render(renderer, player, dungeon) {
    const ctx = renderer.ctx;
    const w = renderer.canvas.width;
    const h = renderer.canvas.height;

    // Scale factors for HUD (tile coords -> pixel coords)
    const scaleX = CONFIG.TILE_SIZE / (renderer.tileSize / (CONFIG.TILE_SIZE / CONFIG.TILE_SIZE));
    const baseScale = renderer.tileSize / CONFIG.TILE_SIZE;
    const hudW = this.width * baseScale;
    const hudH = this.height * baseScale;

    ctx.save();
    // Draw HUD at top-left, in screen space (not world space)
    const hudX = 10 * baseScale;
    const hudY = 10 * baseScale;

    // Dark panel background
    ctx.fillStyle = "rgba(26,26,46,0.85)";
    ctx.fillRect(hudX, hudY, hudW + 10, hudH + 10);
    ctx.strokeStyle = "#3e3e5c";
    ctx.lineWidth = 2;
    ctx.strokeRect(hudX, hudY, hudW + 10, hudH + 10);

    let yOff = hudY + 18;

    // HP Bar
    const hpBarW = hudW;
    const hpBarH = 16 * baseScale;
    const hpX = hudX + 5;
    ctx.fillStyle = "#1a1a2e";
    ctx.fillRect(hpX, yOff, hpBarW, hpBarH);

    // HP fill with pulse effect when low
    const hpRatio = Math.max(0, player.curHP / player.maxHP);
    let hpColor = "#e53935";
    if (hpRatio < 0.3) {
      const pulse = Math.sin(Date.now() * 0.01) * 0.15 + 0.85;
      hpColor = `rgba(198,40,40,${pulse})`; // darker red pulse
    }
    ctx.fillStyle = hpColor;
    ctx.fillRect(hpX, yOff, hpBarW * hpRatio, hpBarH);

    // HP text
    ctx.fillStyle = "#ffffff";
    ctx.font = `bold ${12 * baseScale}px monospace`;
    ctx.textAlign = "center";
    ctx.fillText(`HP ${player.curHP}/${player.maxHP}`, hpX + hpBarW / 2, yOff + hpBarH / 2);

    yOff += hpBarH + 8;

    // XP Bar
    const xpBarW = hudW * 0.7;
    const xpBarH = 10 * baseScale;
    const xpX = hudX + 5;
    ctx.fillStyle = "#1a1a2e";
    ctx.fillRect(xpX, yOff, xpBarW, xpBarH);

    const currentThreshold = CONFIG.XP_THRESHOLDS[player.level] || CONFIG.XP_THRESHOLDS[CONFIG.XP_THRESHOLDS.length - 1];
    const nextThreshold = CONFIG.XP_THRESHOLDS[player.level + 1] || Infinity;
    const xpRatio = player.level >= CONFIG.XP_THRESHOLDS.length ? 1 : (player.xp / (nextThreshold - currentThreshold));

    // XP bar with glow when near level up
    if (xpRatio > 0.8) {
      ctx.shadowColor = "#fdd835";
      ctx.shadowBlur = 6;
    }
    const xpGrad = ctx.createLinearGradient(xpX, yOff, xpX + xpBarW * xpRatio, yOff);
    xpGrad.addColorStop(0, "#1e88e5");
    xpGrad.addColorStop(1, "#fdd835");
    ctx.fillStyle = xpGrad;
    ctx.fillRect(xpX, yOff, xpBarW * Math.min(1, xpRatio), xpBarH);
    ctx.shadowBlur = 0;

    // Level text
    ctx.fillStyle = "#ffffff";
    ctx.font = `bold ${11 * baseScale}px monospace`;
    ctx.textAlign = "left";
    ctx.fillText(`LVL ${player.level}`, xpX + xpBarW + 5, yOff + xpBarH / 2);

    // Weapon name
    ctx.fillStyle = "#b0bec5";
    ctx.font = `${10 * baseScale}px monospace`;
    ctx.fillText(`Weapon: ${player.currentWeapon.name}`, xpX, yOff + xpBarH + 12 * baseScale);

    yOff += hudH;

    // Inventory slots (below HP/XP panel)
    const invY = yOff + 5;
    const slotW = this.slotSize * baseScale;
    const slotH = this.slotSize * baseScale;
    const gap = 3 * baseScale;

    ctx.fillStyle = "rgba(26,26,46,0.7)";
    ctx.fillRect(hudX, invY - 5, this.slotCount * (slotW + gap), slotH + 10);

    for (let i = 0; i < this.slotCount; i++) {
      const sx = hudX + 5 + i * (slotW + gap);
      const sy = invY;

      // Slot background
      ctx.fillStyle = "rgba(30,30,50,0.6)";
      ctx.fillRect(sx, sy, slotW, slotH);
      ctx.strokeStyle = "#3e3e5c";
      ctx.lineWidth = 1;
      ctx.strokeRect(sx, sy, slotW, slotH);

      // Key binding number
      ctx.fillStyle = "rgba(255,255,255,0.3)";
      ctx.font = `${8 * baseScale}px monospace`;
      ctx.textAlign = "left";
      ctx.fillText(`${i + 1}`, sx + 2, sy + slotH - 2);

      // Draw item if present
      const item = player.inventory[i];
      if (item) {
        this.drawItemIcon(ctx, sx + slotW / 2, sy + slotH / 2, item, baseScale);
      }
    }

    // Minimap - top right corner
    this.renderMinimap(renderer, dungeon);

    ctx.restore();
  }

  drawItemIcon(ctx, cx, cy, item, scale) {
    switch (item.itemType) {
      case "potion":
        ctx.fillStyle = "#66bb6a";
        ctx.beginPath();
        ctx.moveTo(cx - 4, cy + 5);
        ctx.lineTo(cx - 3, cy - 2);
        ctx.quadraticCurveTo(cx - 2, cy - 5, cx, cy - 6);
        ctx.quadraticCurveTo(cx + 2, cy - 5, cx + 3, cy - 2);
        ctx.lineTo(cx + 4, cy + 5);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = "#558b2f";
        ctx.fillRect(cx - 1.5, cy - 8, 3, 3);
        break;

      case "key":
        ctx.fillStyle = "#ffd54f";
        ctx.beginPath();
        ctx.arc(cx - 3, cy, 3.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#1a1a1a";
        ctx.beginPath();
        ctx.arc(cx - 3, cy, 1.2, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillRect(cx + 0.5, cy - 1, 8, 2);
        ctx.fillRect(cx + 6, cy + 1, 2, 3);
        break;

      case "weapon":
        ctx.save();
        ctx.translate(cx, cy);
        const angle = Math.atan2(dungeon.player.getCenterY() - cy * (renderer.tileSize / CONFIG.TILE_SIZE), dungeon.player.getCenterX() - cx * (renderer.tileSize / CONFIG.TILE_SIZE));
        ctx.rotate(angle || 0);
        ctx.fillStyle = "#b0bec5";
        ctx.beginPath();
        ctx.moveTo(6, -1);
        ctx.lineTo(-4, -2);
        ctx.lineTo(-8, -1.5);
        ctx.lineTo(-8, 1.5);
        ctx.lineTo(-4, 2);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = "#b0bec5";
        ctx.fillRect(-10, -2, 3, 4);
        ctx.fillStyle = "#5d4037";
        ctx.fillRect(-13, -1.5, 3, 3);
        ctx.restore();
        break;
    }
  }

  renderMinimap(renderer, dungeon) {
    const ctx = renderer.ctx;
    const w = renderer.canvas.width;
    const h = renderer.canvas.height;
    const ts = CONFIG.TILE_SIZE;
    const scale = CONFIG.MINIMAP_TILE_SCALE;

    const mmW = (CONFIG.MAP_TILES_X + 4) * scale;
    const mmH = (CONFIG.MAP_TILES_Y + 2) * scale;
    const mmX = w - mmW - 10 * (renderer.tileSize / ts);
    const mmY = 10 * (renderer.tileSize / ts);

    // Panel background
    ctx.fillStyle = "rgba(10,10,20,0.85)";
    ctx.fillRect(mmX - 2, mmY - 2, mmW + 4, mmH + 4);
    ctx.strokeStyle = "#3e3e5c";
    ctx.lineWidth = 1;
    ctx.strokeRect(mmX - 2, mmY - 2, mmW + 4, mmH + 4);

    // Draw explored tiles
    for (let y = 0; y < CONFIG.MAP_TILES_Y; y++) {
      for (let x = 0; x < CONFIG.MAP_TILES_X; x++) {
        const tile = dungeon.getTile(x, y);
        const isExplored = this._isTileExplored(dungeon, x, y);

        if (!isExplored) continue;

        let color;
        switch (tile) {
          case TILES.WALL: color = "#1a1a1a"; break;
          case TILES.FLOOR: color = "#2d2d2d"; break;
          case TILES.CORRIDOR_FLOOR: color = "#333333"; break;
          case TILES.DOOR_UNLOCKED: color = "#4a3000"; break;
          case TILES.DOOR_LOCKED: color = "#5d3a1a"; break;
          case TILES.HAZARD: color = "rgba(230,81,0,0.5)"; break;
          case TILES.EXIT: color = "#fdd835"; break;
          default: color = "#1a1a1a";
        }

        ctx.fillStyle = color;
        ctx.fillRect(mmX + x * scale, mmY + y * scale, scale, scale);
      }
    }

    // Room rectangles for explored rooms
    for (let i = 0; i < dungeon.rooms.length; i++) {
      const room = dungeon.rooms[i];
      if (this._isRoomExplored(dungeon, room)) {
        ctx.strokeStyle = room === dungeon.currentRoom ? "#4fc3f7" : "rgba(79,195,247,0.3)";
        ctx.lineWidth = room === dungeon.currentRoom ? 2 : 1;
        ctx.strokeRect(mmX + room.x * scale, mmY + room.y * scale, room.w * scale, room.h * scale);
      }
    }

    // Player position (cyan dot)
    const ptx = Math.floor((dungeon.player.x + dungeon.player.width / 2) / ts);
    const pty = Math.floor((dungeon.player.y + dungeon.player.height / 2) / ts);
    ctx.fillStyle = "#4fc3f7";
    ctx.beginPath();
    ctx.arc(mmX + ptx * scale + scale / 2, mmY + pty * scale + scale / 2, scale * 0.6, 0, Math.PI * 2);
    ctx.fill();

    // Enemy positions (red dots for enemies in current room)
    if (dungeon.currentRoom) {
      for (const enemy of dungeon.currentRoom.enemies) {
        const etx = Math.floor((enemy.x + enemy.width / 2) / ts);
        const ety = Math.floor((enemy.y + enemy.height / 2) / ts);
        if (this._isTileExplored(dungeon, etx, ety)) {
          ctx.fillStyle = "#e53935";
          ctx.fillRect(mmX + etx * scale, mmY + ety * scale, scale, scale);
        }
      }
    }
  }

  _isTileExplored(dungeon, x, y) {
    const room = dungeon.getRoomAt(x, y);
    if (!room) return false;
    const idx = dungeon.rooms.indexOf(room);
    return dungeon.exploredRooms.has(`room_${idx}`);
  }

  _isRoomExplored(dungeon, room) {
    const idx = dungeon.rooms.indexOf(room);
    return dungeon.exploredRooms.has(`room_${idx}`);
  }
}

// ================================================================
// MAIN GAME CLASS - Manages all game states and the game loop
// States: START, PLAYING, PAUSED, GAME_OVER, VICTORY
// ================================================================
class Game {
  constructor() {
    this.canvas = document.getElementById("gameCanvas");
    this.ctx = this.canvas.getContext("2d");

    this.input = new InputSystem();
    this.audio = new AudioEngine();
    this.particles = new ParticleSystem(CONFIG.MAX_PARTICLES);
    this.renderer = new Renderer(this.canvas);
    this.camera = new Camera();
    this.hud = new HUD();

    this.state = "START"; // START, PLAYING, PAUSED, GAME_OVER, VICTORY
    this.dungeon = null;

    // State variables
    this.dungeonDepth = 1;
    this.startSeed = Math.floor(Math.random() * 999999);
    this._screenFlash = { color: null, alpha: 0 };
    this._transitionAlpha = 0;
    this._transTarget = "none";

    // Stats tracking across levels
    this.totalEnemiesDefeated = 0;
    this.totalItemsCollected = 0;

    // Resize handler
    window.addEventListener("resize", () => this.resize());
    this.resize();

    // Start the game loop
    this.lastTime = performance.now();
    this.accumulator = 0;
    this._gameRunning = true;
    this._requestId = null;
  }

  resize() {
    const dpr = window.devicePixelRatio || 1;
    this.canvas.width = Math.min(window.innerWidth, 1280);
    this.canvas.height = Math.min(window.innerHeight, 720);
    this.renderer.resize(this.canvas.width, this.canvas.height);
    this.camera.w = this.canvas.width;
    this.camera.h = this.canvas.height;
  }

  start() {
    // Start audio on user interaction (Enter pressed)
    this.audio.init();
    this.audio.startMusic();

    // Generate new dungeon
    this.dungeon = new Dungeon(this.input, this.audio, this.particles);
    const result = this.dungeon.generate(this.startSeed, this.dungeonDepth);

    this.player = result.player;
    this.currentRoom = result.currentRoom;

    // Reset camera to player position
    this.camera.x = this.player.x - this.camera.w / 2 + CONFIG.TILE_SIZE * 0.4;
    this.camera.y = this.player.y - this.camera.h / 2 + CONFIG.TILE_SIZE * 0.4;
    this.camera.shakeIntensity = 0;

    // Clear particles and floating texts
    this.particles.clear();

    this.state = "PLAYING";
    this._screenFlash = { color: null, alpha: 0 };

    this.startGameLoop();
  }

  startGameLoop() {
    if (this._requestId) return; // Already running
    this.lastTime = performance.now();
    this.accumulator = 0;
    this.loop();
  }

  loop() {
    if (!this._gameRunning) return;

    const now = performance.now();
    let dt = (now - this.lastTime) / 1000;
    this.lastTime = now;

    // Clamp dt to prevent spiral of death
    dt = Math.min(dt, 0.25);

    // State-based update
    switch (this.state) {
      case "START":
        this.updateStart(dt);
        break;
      case "PLAYING":
        this.updatePlaying(dt);
        break;
      case "PAUSED":
        this.updatePaused(dt);
        break;
      case "GAME_OVER":
        this.updateGameOver(dt);
        break;
      case "VICTORY":
        this.updateVictory(dt);
        break;
    }

    this.render();

    this._requestId = requestAnimationFrame(() => this.loop());
  }

  // ================================================================
  // GAME STATE UPDATES
  // ================================================================
  updateStart(dt) {
    if (this.input.wasPressed("Enter")) {
      this.startSeed = Math.floor(Math.random() * 999999);
      this.dungeonDepth = 1;
      this.totalEnemiesDefeated = 0;
      this.totalItemsCollected = 0;
      this._transTarget = "start-play";
    }

    // Handle pause from start screen
    if (this.input.wasPressed("Escape")) {
      // Do nothing on start screen
    }
  }

  updatePlaying(dt) {
    // Hit-stop check
    const hitStopFrames = this.camera._hitStop || 0;

    // Room transition handling
    if (this.dungeon._transitioning) {
      this.dungeon.updateTransition(dt);
      return; // Skip regular updates during transition
    }

    // Victory trigger check
    if (this.dungeon._victoryTriggered) {
      this.showVictory();
      return;
    }

    // Fixed timestep accumulator for deterministic physics
    const fixedStep = CONFIG.FIXED_TIMESTEP;
    this.accumulator += dt;
    let steps = 0;
    while (this.accumulator >= fixedStep && steps < CONFIG.MAX_FRAME_SKIP) {
      this.fixedUpdate(fixedStep);
      this.accumulator -= fixedStep;
      steps++;
    }

    // If we still have remaining accumulator, do a partial update for smooth rendering
    if (this.accumulator > 0) {
      this.renderPartial(this.accumulator);
    }
  }

  fixedUpdate(dt) {
    if (this.state !== "PLAYING" || !this.dungeon || this.player.dead) return;

    // Update player
    this.player.update(dt, this.dungeon);

    // Room transition check
    this.dungeon.checkRoomTransition();

    // Check player attack hitbox against enemies
    this.dungeon.handleCombat(dt);

    // Remove dead entities and process deaths
    this.dungeon.removeDeadEntities();

    // Update enemies in current room
    if (this.currentRoom) {
      for (const enemy of this.currentRoom.enemies) {
        enemy.update(dt, this.dungeon);
      }
    }

    // Check if all enemies in boss room are dead (victory condition)
    if (this.currentRoom && this.currentRoom.isBoss) {
      const aliveEnemies = this.currentRoom.enemies.filter(e => e.active && !e.dead);
      if (aliveEnemies.length === 0 && !this.dungeon._victoryTriggered) {
        this.dungeon.triggerVictory();
        return;
      }
    }

    // Update projectiles
    for (const proj of this.dungeon.projectiles) {
      proj.update(dt, this.dungeon);
    }

    // Update ground items
    for (const item of this.dungeon.items) {
      item.update(dt, this.dungeon);
    }

    // Clean up dead projectiles and items
    this.dungeon.projectiles = this.dungeon.projectiles.filter(p => p.active);
    this.dungeon.items = this.dungeon.items.filter(i => i.active);

    // Check game over
    if (this.player.dead) {
      this.showGameOver();
      return;
    }

    // Handle inventory slot keys
    this.dungeon.handleInventory(this.input);

    // Update particles
    this.particles.update(dt);

    // Update camera
    this.camera.update(dt, this.player.x, this.player.y, CONFIG.MAP_TILES_X, CONFIG.MAP_TILES_Y);

    // Level-up celebration check (done after XP gain in player.update)
    if (this.player.levelUpAnimTimer > 0.5) {
      // Trigger level-up effects
      this.particles.spawnLevelUpBurst(this.player.getCenterX(), this.player.getCenterY());
      this.particles.spawnFloatingText("LEVEL UP!", this.player.getCenterX(), this.player.y - 30, 255, 216, 53, 20);
      this._screenFlash = { color: "rgba(255,216,53,0.2)", alpha: 0.5 };
    }

    // Screen flash decay
    if (this._screenFlash.alpha > 0) {
      this._screenFlash.alpha -= dt * 2;
    }

    // Camera shake decay
    this.camera.shakeIntensity *= CONFIG.SCREEN_SHAKE_DECAY;
    if (this.camera.shakeIntensity < 0.1) {
      this.camera.shakeIntensity = 0;
    }

    // Update music intensity based on enemy proximity
    const nearestEnemyDist = this.getNearestEnemyDistance();
    const combatIntensity = nearestEnemyDist < CONFIG.TILE_SIZE * 8 ? 1 : 0;
    this.audio.setMusicIntensity(combatIntensity);
  }

  renderPartial(dt) {
    // Called when accumulator has remaining time for smooth rendering between fixed steps
  }

  updatePaused(dt) {
    if (this.input.wasPressed("Escape")) {
      this.state = "PLAYING";
    }
  }

  updateGameOver(dt) {
    if (this.input.wasPressed("Enter")) {
      // Return to start screen
      this.audio.stopMusic();
      this.particles.clear();
      this._transTarget = "go-start";
    }
  }

  updateVictory(dt) {
    if (this.input.wasPressed("Enter")) {
      // Go to next level with increased difficulty
      this.dungeonDepth++;
      this.startSeed = Math.floor(Math.random() * 999999);
      this.audio.stopMusic();
      this.particles.clear();

      // Re-init audio for new level
      this.audio.init();
      this.audio.startMusic();

      this.dungeon = new Dungeon(this.input, this.audio, this.particles);
      const result = this.dungeon.generate(this.startSeed, this.dungeonDepth);

      this.player = result.player;
      this.currentRoom = result.currentRoom;

      this.camera.x = this.player.x - this.camera.w / 2 + CONFIG.TILE_SIZE * 0.4;
      this.camera.y = this.player.y - this.camera.h / 2 + CONFIG.TILE_SIZE * 0.4;

      this.state = "PLAYING";
    }

    if (this.input.wasPressed("Escape")) {
      // Return to start screen
      this.audio.stopMusic();
      this.particles.clear();
      this._transTarget = "victory-start";
    }
  }

  getNearestEnemyDistance() {
    let minDist = Infinity;
    if (this.currentRoom) {
      for (const enemy of this.currentRoom.enemies) {
        const dx = enemy.getCenterX() - this.player.getCenterX();
        const dy = enemy.getCenterY() - this.player.getCenterY();
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < minDist) minDist = dist;
      }
    }
    return minDist === Infinity ? Infinity : minDist;
  }

  showGameOver() {
    this.state = "GAME_OVER";
    this.audio.stopMusic();
    // Death particles
    this.particles.spawnExplosion(this.player.getCenterX(), this.player.getCenterY(), 30, 79, 195, 247, 100, 0.8);
    this._transTarget = "go-start";
  }

  showVictory() {
    this.state = "VICTORY";
    this.totalEnemiesDefeated += (this.dungeon.currentRoom ? this.dungeon.currentRoom.enemies.filter(e => e.active || true).length : 0);
    this.audio.stopMusic();
    // Victory particles
    this.particles.spawnExplosion(this.player.getCenterX(), this.player.getCenterY(), 40, 253, 216, 53, 120, 1.0);
    this._transTarget = "victory-start";
  }

  // ================================================================
  // RENDERING - Full scene rendering pipeline
  // ================================================================
  render() {
    const ctx = this.renderer.ctx;
    const w = this.canvas.width;
    const h = this.canvas.height;
    const scale = this.renderer.tileSize / CONFIG.TILE_SIZE;

    switch (this.state) {
      case "START":
        this.renderStartScreen(ctx, w, h, scale);
        break;

      case "PLAYING":
        if (!this.dungeon || !this.player) {
          this.renderStartScreen(ctx, w, h, scale);
          return;
        }

        // Apply camera transform
        this.renderer.cameraX = this.camera.x + (this.camera.shakeX || 0);
        this.renderer.cameraY = this.camera.y + (this.camera.shakeY || 0);

        ctx.save();
        ctx.translate(this.renderer.offsetX, this.renderer.offsetY);
        ctx.scale(scale, scale);
        ctx.translate(-this.renderer.cameraX + w / 2 - CONFIG.MAP_TILES_X * CONFIG.TILE_SIZE / 2,
                       -this.renderer.cameraY + h / 2 - CONFIG.MAP_TILES_Y * CONFIG.TILE_SIZE / 2);

        // Draw dungeon tiles
        this.dungeon.render(this.renderer, this.camera);

        // Draw items
        this.dungeon.renderItems(this.renderer);

        // Draw enemies in current room
        this.dungeon.renderEnemies(this.renderer);

        // Draw player
        if (!this.player.dead) this.player.render(this.renderer);

        // Draw projectiles
        this.dungeon.renderProjectiles(this.renderer);

        // Draw particles
        this.particles.render(this.renderer);

        ctx.restore();

        // Screen flash overlay
        if (this._screenFlash.alpha > 0 && this._screenFlash.color) {
          ctx.fillStyle = this._screenFlash.color;
          ctx.globalAlpha = this._screenFlash.alpha;
          ctx.fillRect(0, 0, w, h);
          ctx.globalAlpha = 1;
        }

        // Transition overlay (fade to/from black during room changes)
        const transAlpha = this.dungeon.getTransitionAlpha();
        if (transAlpha > 0) {
          ctx.fillStyle = `rgba(0,0,0,${transAlpha})`;
          ctx.fillRect(0, 0, w, h);
        }

        // HUD overlay
        this.hud.render(this.renderer, this.player, this.dungeon);

        // Pause indicator if needed (but PLAYING state shouldn't show pause)
        break;

      case "PAUSED":
        // Render underlying game scene
        if (this.dungeon && this.player) {
          this.renderer.cameraX = this.camera.x + (this.camera.shakeX || 0);
          this.renderer.cameraY = this.camera.y + (this.camera.shakeY || 0);

          ctx.save();
          ctx.translate(this.renderer.offsetX, this.renderer.offsetY);
          ctx.scale(scale, scale);
          ctx.translate(-this.renderer.cameraX + w / 2 - CONFIG.MAP_TILES_X * CONFIG.TILE_SIZE / 2,
                         -this.renderer.cameraY + h / 2 - CONFIG.MAP_TILES_Y * CONFIG.TILE_SIZE / 2);

          this.dungeon.render(this.renderer, this.camera);
          this.dungeon.renderItems(this.renderer);
          this.dungeon.renderEnemies(this.renderer);
          if (!this.player.dead) this.player.render(this.renderer);
          this.dungeon.renderProjectiles(this.renderer);
          this.particles.render(this.renderer);

          ctx.restore();
        }

        // Semi-transparent black overlay
        ctx.fillStyle = "rgba(0,0,0,0.6)";
        ctx.fillRect(0, 0, w, h);

        // PAUSED text
        ctx.fillStyle = "#ffffff";
        ctx.font = "bold 48px monospace";
        ctx.textAlign = "center";
        ctx.fillText("PAUSED", w / 2, h / 2 - 30);
        ctx.font = "16px monospace";
        ctx.fillStyle = "#b0bec5";
        ctx.fillText("Press ESC to resume", w / 2, h / 2 + 20);
        break;

      case "GAME_OVER":
        this.renderGameOverScreen(ctx, w, h, scale);
        break;

      case "VICTORY":
        this.renderVictoryScreen(ctx, w, h, scale);
        break;
    }

    // Handle transitions between game states
    this.handleStateTransition();

    // Clear pressed keys for next frame
    this.input.frameEnd();
  }

  handleStateTransition() {
    switch (this._transTarget) {
      case "start-play":
        if (this.state === "START") {
          // Will be handled by start() call in updatePlaying
          this._transTarget = "none";
        }
        break;
      case "go-start":
        this.audio.stopMusic();
        this.particles.clear();
        this.dungeon = null;
        this.player = null;
        this.state = "START";
        this._transTarget = "none";
        break;
      case "victory-start":
        this.audio.stopMusic();
        this.particles.clear();
        this.dungeon = null;
        this.player = null;
        this.state = "START";
        this._transTarget = "none";
        break;
    }
  }

  // ================================================================
  // SCREEN RENDERING FOR EACH GAME STATE
  // ================================================================
  renderStartScreen(ctx, w, h, scale) {
    // Dark dungeon background with torch glow
    ctx.fillStyle = "#0a0a10";
    ctx.fillRect(0, 0, w, h);

    // Draw subtle floor grid
    const gridSize = 64;
    ctx.strokeStyle = "rgba(45,45,45,0.2)";
    ctx.lineWidth = 1;
    for (let y = 0; y < h; y += gridSize) {
      for (let x = 0; x < w; x += gridSize) {
        ctx.strokeRect(x, y, gridSize, gridSize);
      }
    }

    // Ambient torch glow effects
    const time = Date.now() * 0.001;
    this._drawTorchGlow(ctx, w * 0.2, h * 0.3, Math.sin(time * 0.7) * 0.1 + 0.2);
    this._drawTorchGlow(ctx, w * 0.8, h * 0.3, Math.sin(time * 0.5 + 1) * 0.1 + 0.2);
    this._drawTorchGlow(ctx, w * 0.5, h * 0.6, Math.sin(time * 0.8 + 2) * 0.08 + 0.15);

    // Title: DUNGEON DELVER
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    // Title shadow
    ctx.fillStyle = "#000000";
    ctx.font = `bold ${Math.min(64, w * 0.05)}px monospace`;
    ctx.fillText("DUNGEON DELVER", w / 2 + 3, h * 0.2 + 3);

    // Title text with gradient effect
    const titleGrad = ctx.createLinearGradient(w * 0.2, h * 0.15, w * 0.8, h * 0.25);
    titleGrad.addColorStop(0, "#4fc3f7");
    titleGrad.addColorStop(0.5, "#ffffff");
    titleGrad.addColorStop(1, "#4fc3f7");
    ctx.fillStyle = titleGrad;
    ctx.fillText("DUNGEON DELVER", w / 2, h * 0.2);

    // Subtitle
    ctx.font = `${Math.min(16, w * 0.015)}px monospace`;
    ctx.fillStyle = "#b0bec5";
    ctx.fillText("A Procedural Dungeon Crawler", w / 2, h * 0.27);

    // Decorative sword line
    ctx.strokeStyle = "rgba(79,195,247,0.3)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(w * 0.3, h * 0.32);
    ctx.lineTo(w * 0.7, h * 0.32);
    ctx.stroke();

    // Instructions panel
    const panelY = h * 0.38;
    const panelW = Math.min(500, w * 0.6);
    const panelH = h * 0.42;
    ctx.fillStyle = "rgba(26,26,46,0.7)";
    ctx.fillRect(w / 2 - panelW / 2, panelY, panelW, panelH);
    ctx.strokeStyle = "#3e3e5c";
    ctx.lineWidth = 1;
    ctx.strokeRect(w / 2 - panelW / 2, panelY, panelW, panelH);

    // Instructions text
    ctx.font = `${Math.min(14, w * 0.012)}px monospace`;
    ctx.fillStyle = "#e0e0e0";
    const instructions = [
      ["Movement", "Arrow Keys or ZQSD (Z=up Q=left S=down D=right)"],
      ["Attack", "Space bar"],
      ["Inventory", "Number keys 1-8 to use items"],
      ["Pause", "Escape"],
    ];

    let iy = panelY + 30;
    for (const [label, desc] of instructions) {
      ctx.fillStyle = "#4fc3f7";
      ctx.textAlign = "left";
      ctx.fillText(`${label}:`, w / 2 - panelW / 2 + 30, iy);
      ctx.fillStyle = "#b0bec5";
      ctx.fillText(desc, w / 2 - panelW / 2 + 140, iy);
      iy += 28;
    }

    // Color palette legend
    iy += 10;
    ctx.fillStyle = "#ffd54f";
    ctx.font = `bold ${Math.min(12, w * 0.01)}px monospace`;
    ctx.fillText("COLOR GUIDE:", w / 2 - panelW / 2 + 30, iy);
    iy += 20;

    const paletteColors = [
      ["Player", "#4fc3f7"],
      ["Floor", "#2d2d2d"],
      ["Walls", "#1a1a1a"],
      ["Slimes", "#4caf50"],
      ["Skeletons", "#eeeeee / #ff5722 eyes"],
      ["Mini-Boss", "#b71c1c"],
      ["Potions", "#66bb6a"],
      ["Keys", "#ffd54f"],
    ];

    for (const [name, color] of paletteColors) {
      ctx.fillStyle = color;
      ctx.fillRect(w / 2 - panelW / 2 + 30, iy - 8, 12, 12);
      ctx.fillStyle = "#b0bec5";
      ctx.font = `${Math.min(10, w * 0.008)}px monospace`;
      ctx.fillText(name, w / 2 - panelW / 2 + 48, iy);
      iy += 18;
    }

    // Press Enter to Start (pulsing)
    const pulse = Math.sin(Date.now() * 0.004) * 0.3 + 0.7;
    ctx.font = `bold ${Math.min(20, w * 0.018)}px monospace`;
    ctx.textAlign = "center";
    ctx.fillStyle = `rgba(255,255,255,${pulse})`;
    ctx.fillText("Press ENTER to Start", w / 2, h * 0.88);

    // Seed display for debugging
    ctx.font = `${Math.min(10, w * 0.008)}px monospace`;
    ctx.fillStyle = "rgba(176,190,197,0.4)";
    ctx.fillText(`Seed: ${this.startSeed}`, w / 2, h * 0.95);
  }

  _drawTorchGlow(ctx, x, y, alpha) {
    const gradient = ctx.createRadialGradient(x, y, 0, x, y, 80);
    gradient.addColorStop(0, `rgba(255,140,50,${alpha})`);
    gradient.addColorStop(0.5, `rgba(255,100,20,${alpha * 0.3})`);
    gradient.addColorStop(1, "rgba(255,60,0,0)");
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(x, y, 80, 0, Math.PI * 2);
    ctx.fill();

    // Torch flicker
    ctx.fillStyle = `rgba(255,200,100,${alpha * 1.5})`;
    ctx.beginPath();
    ctx.arc(x + Math.sin(Date.now() * 0.01) * 2, y, 4, 0, Math.PI * 2);
    ctx.fill();
  }

  renderGameOverScreen(ctx, w, h, scale) {
    // Fade to black
    let alpha = 0.8;
    if (!this._fadeAlpha) this._fadeAlpha = 0;
    this._fadeAlpha = Math.min(1, this._fadeAlpha + 0.02);
    ctx.fillStyle = `rgba(0,0,0,${this._fadeAlpha})`;
    ctx.fillRect(0, 0, w, h);

    // Game Over text
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.font = `bold ${Math.min(56, w * 0.04)}px monospace`;
    ctx.fillStyle = "#e53935";
    ctx.fillText("GAME OVER", w / 2, h * 0.3);

    // Stats panel
    const panelW = Math.min(400, w * 0.5);
    const panelH = 180;
    ctx.fillStyle = "rgba(26,26,46,0.8)";
    ctx.fillRect(w / 2 - panelW / 2, h * 0.4, panelW, panelH);
    ctx.strokeStyle = "#e53935";
    ctx.lineWidth = 1;
    ctx.strokeRect(w / 2 - panelW / 2, h * 0.4, panelW, panelH);

    ctx.font = `${Math.min(14, w * 0.012)}px monospace`;
    let sy = h * 0.4 + 30;

    ctx.fillStyle = "#e0e0e0";
    ctx.textAlign = "left";
    ctx.fillText(`Dungeon Depth: ${this.dungeonDepth}`, w / 2 - panelW / 2 + 30, sy);
    sy += 25;
    ctx.fillText(`Enemies Defeated: ${this.totalEnemiesDefeated}`, w / 2 - panelW / 2 + 30, sy);
    sy += 25;
    ctx.fillText(`Items Collected: ${this.totalItemsCollected}`, w / 2 - panelW / 2 + 30, sy);
    if (this.player) {
      sy += 25;
      ctx.fillText(`Player Level: ${this.player.level}`, w / 2 - panelW / 2 + 30, sy);
      sy += 25;
      ctx.fillText(`XP: ${this.player.xp}/${this.getLevelUpXP(this.player)}`, w / 2 - panelW / 2 + 30, sy);
    }

    // Retry prompt with pulsing animation
    const pulse = Math.sin(Date.now() * 0.004) * 0.3 + 0.7;
    ctx.font = `bold ${Math.min(18, w * 0.015)}px monospace`;
    ctx.textAlign = "center";
    ctx.fillStyle = `rgba(255,255,255,${pulse})`;
    ctx.fillText("Press ENTER to Return to Title", w / 2, h * 0.8);
  }

  getLevelUpXP(player) {
    const idx = player.level;
    if (idx >= CONFIG.XP_THRESHOLDS.length - 1) return "MAX";
    return `${CONFIG.XP_THRESHOLDS[idx]}`;
  }

  renderVictoryScreen(ctx, w, h, scale) {
    let alpha = 0.8;
    if (!this._fadeAlpha) this._fadeAlpha = 0;
    this._fadeAlpha = Math.min(1, this._fadeAlpha + 0.02);

    // Dark overlay
    ctx.fillStyle = `rgba(0,0,0,${this._fadeAlpha})`;
    ctx.fillRect(0, 0, w, h);

    // Victory text with golden glow
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    const time = Date.now() * 0.002;
    const titleColor = `hsl(${45 + Math.sin(time) * 10},80%,${60 + Math.sin(time * 0.5) * 10}%)`;
    ctx.font = `bold ${Math.min(52, w * 0.04)}px monospace`;

    // Golden glow behind title
    this._drawGlowCenter(ctx, w / 2, h * 0.28, 100 + Math.sin(time) * 10, "rgba(253,216,53,0.3)");
    ctx.fillStyle = titleColor;
    ctx.fillText("LEVEL CLEARED!", w / 2, h * 0.28);

    // Stats panel
    const panelW = Math.min(450, w * 0.55);
    const panelH = 200;
    ctx.fillStyle = "rgba(26,26,46,0.8)";
    ctx.fillRect(w / 2 - panelW / 2, h * 0.38, panelW, panelH);
    ctx.strokeStyle = "#fdd835";
    ctx.lineWidth = 1;
    ctx.strokeRect(w / 2 - panelW / 2, h * 0.38, panelW, panelH);

    ctx.font = `${Math.min(14, w * 0.012)}px monospace`;
    let sy = h * 0.38 + 30;

    ctx.fillStyle = "#e0e0e0";
    ctx.textAlign = "left";
    ctx.fillText(`Dungeon Depth: ${this.dungeonDepth}`, w / 2 - panelW / 2 + 30, sy);
    sy += 25;
    ctx.fillText(`Player Level: ${this.player ? this.player.level : "?"}`, w / 2 - panelW / 2 + 30, sy);
    sy += 25;
    ctx.fillText(`Enemies Defeated: ${this.totalEnemiesDefeated}`, w / 2 - panelW / 2 + 30, sy);
    sy += 25;
    ctx.fillText(`Items Collected: ${this.player ? this.player.itemsCollected : "?"}`, w / 2 - panelW / 2 + 30, sy);
    sy += 25;
    if (this.player) {
      ctx.fillText(`Equipped Weapon: ${this.player.currentWeapon.name}`, w / 2 - panelW / 2 + 30, sy);
      sy += 25;
      ctx.fillText(`Potions Remaining: ${this.player.inventory.filter(i => i && i.itemType === "potion").length}`, w / 2 - panelW / 2 + 30, sy);
    }

    // Options with pulsing prompt
    const pulse = Math.sin(Date.now() * 0.004) * 0.3 + 0.7;
    ctx.font = `bold ${Math.min(18, w * 0.015)}px monospace`;
    ctx.textAlign = "center";
    ctx.fillStyle = `rgba(255,255,255,${pulse})`;
    ctx.fillText("Press ENTER for Next Level", w / 2, h * 0.78);

    ctx.font = `${Math.min(14, w * 0.012)}px monospace`;
    ctx.fillStyle = "rgba(176,190,197,0.6)";
    ctx.fillText("Press ESC to Return to Title", w / 2, h * 0.85);

    // Render any remaining particles
    this.particles.render(this.renderer);
  }

  _drawGlowCenter(ctx, cx, cy, radius, color) {
    const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
    gradient.addColorStop(0, color);
    gradient.addColorStop(1, "transparent");
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.fill();
  }

  /** Stop the game loop */
  stop() {
    this._gameRunning = false;
    if (this._requestId) {
      cancelAnimationFrame(this._requestId);
      this._requestId = null;
    }
  }
}

// ================================================================
// INITIALIZE AND START THE GAME
// ================================================================
window.addEventListener("load", () => {
  const game = new Game();
});
</script>
</body>
